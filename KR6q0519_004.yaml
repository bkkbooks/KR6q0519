body:
  text: 小師序璋等記元旦上堂於一切諸法無所行而觀諸法如實相昨朝舊歲今日新年威儀相酢人事周圓同堂俎豆陳列燦然發揚章表無閟不宣更待伐鼓敲鐘說無論有山僧實是未曾問人借得口葵石郡侯暨諸紳衿長者居士舉放生社設齋上堂問何事盡天下人躍然而起師曰今日一會不是小緣進曰若然者則千花繡錦憑仗春風萬類飛潛全承渠力也師曰且道承渠箇甚麼力進云引領雲天無任懷想師云作不世出之佛事須還沒量大人進曰珍護順時法門永賴師曰誠如所言吾計得之矣乃曰此廣大平等慈濟之心即諸佛列祖之心在天而天不能籠蓋在地而地不能阻礙雲霞千變江河長流從上相傳謂之心地藏謂之清涼幢亦云善淨亦云寶印亦云不退輪亦云法界總持建功建德布陰布陽秪在當人善得本有無涯之量不礙之常彌綸沙界而無物不周化被群機而跡無偏寄中庸不云乎大哉聖人之道發育萬物峻極於天道非明德至善之人其何能崇隆荷擔近來叢林例皆浮摹軌跡擘劃聲文以致吾道轉入杳渺據實而論苟非沒量大人難與激揚提唱隨以拂子指生物曰且道是有生耶是無生耶若道有生是著有相若道無生是著無相有無生滅斷常作其取舍希望得佛得菩提得涅槃抑亦未矣從來真如實際迥絕名模那有如是道理欲明西來遠旨看取目前萬化喝一喝曰一處起千處百處雲興一處沒千處百處不識雲興則天上人間翱翔自在不識則三江七澤游泳無方所以云無量劫來原解脫何須更問知不知知得是箇甚麼不知又是箇甚麼然必走上箇路始見地闊天空曩謨佛陀曩謨達磨曩謨僧伽曩謨觀自在菩薩具大悲心者那裏不是你出身之處昇騰之時尚涉遲疑迴旋涸轍復喝一喝曰路透清波平徹底生機鱍鱍看隨流小參諸法無法體而說惟是心不見於自心而起於分別江南兩浙春寒秋熱觀世音菩薩將錢買胡餅放下手來卻是生鐵上堂八萬四千非鳳毛多虛不如少實三十三人入虎穴說到何如行到喝一喝曰真如今日為眾竭力不顧危亡赤身直入去也還有見義勇為者麼又喝一喝曰者箇所在豈同兒戲開得這張口自能霧起雲騰用得者副手何難風行草偃虛空中勒馬七縱八橫電影裏操旗東涌西沒縱擒在我殺活臨時非但踞虎頭亦能收虎尾復連喝兩喝大雄山下忽相逢落落聲光皆振地二月八日燒香從佛口生從法化生得佛法分底者箇時節少不得爇一炷香殊不知此香來處且道從什麼處來乃拈起一瓣曰昔日迦葉親聞此旨眼是淨光無礙正法眼心是光明清淨涅槃心竺乾四七東土二三直下第五葉臨濟慧照大師於實相無相微妙法門中建立真佛真法真道三句而不依住此三句亦無不依住知解始終同此香光智智清淨無二無分無別無斷無別無斷即且置香光在什麼處還拈得出麼若拈得出是甚蛇毒蝎毒蠱毒生金銀毒管教天下老和尚覷著則眼瞎嗅著則腦裂若拈不出而我試放一道遂插向爐中乃喝曰於此光不透脫目前有物為礙一切事一切理如何得翫弄神變展拓開提而今眾中還有一句透過三句一切照用任聽縱橫咳唾掉臂轉動施為盡是佛慧盡是法光盡為道用者麼若有不妨奇特若無莫怪欺汝諸人謾汝諸人不見我靈嵒本師退翁老和尚昔於軫翼分野南嶽福嚴般若臺最輪前盡情說此香光如杲日麗天僻壤遐陬無不蒙照今腳下兒真如善鄻於東震旦國秀州管內二月八日高天厚地之中又顯示箇什麼隨大喝兩喝曰丈夫自有衝天志不向如來行處行虞在欽薛楚玉兩護法放生設齋上堂問何法得解脫一切師曰我不畫地以限進曰是則大智絕羅籠也師曰無人孟浪過你進曰其然豈然師曰或者磕著未定進曰還得全體超越也無師曰豈徒見山高而水清問無底籃盛將來底如何得箇不違物性師曰其至是者心孰不動進曰審爾則同業異報師曰子將微芒感應之機乎進曰也顯南嶽門下師曰有恁麼一件事乃曰江河無心礙你頭頭自在涵泳於父母未生以前你無心礙江河著著截斷眾流於奔騰浩渺之鄉所謂自己法性海中去來絕跡逆順同源苟忘情於逆順自無滯於去來諸相不生逆順何咎此則於心無心於跡絕跡又何有於去來逆順之分是以心隨萬境轉轉處實能幽隨流認得性無喜亦無憂到者裏江河與你將來合作得箇甚麼喝一喝曰參同不二心普教成佛去出隊回上堂東山演和尚曰太平不會禪一向外邊走臘月三十日贏得一張口真如不唧溜撞著惡辣手把住要說禪無計脫身走秪得隨氀𣯜打開布袋口隨喝一喝曰慎勿實諸所無但願空諸所有早參瞳神築氣毬夢裏打三更未央雞亂叫茫茫踏白行塔影黑入水玎璫殿角鈴聞中既透脫見處定精明我亦從中入非惟觀世音喝一喝曰背後底是甚麼人小參夜來好一寤睡霜鐘打作兩橛還有知幻即離不作方便離幻即覺亦無漸次底麼良久曰歸堂喫茶晚參自古先德皆有出人之路真如不甘心坐他第二把椅子驀豎竹篦曰然亦莫越於此有馳驟天衢底神足請從者裏放步一眾卻立師曰莫謂楊岐山勢嶮前頭更有最高峰晚參問僧一句當天八萬生死門永絕如何是當天一句一曰要頭斫取去一曰痛領一問一曰欲舉恐驚眾一曰有耳咸知一曰口似鼻孔末上一僧曰佛殿挂在燈籠上師曰甚處見得僧擬進師劈頭打曰依舊縮入露柱裏去也僧卻問如何是當天一句師隨聲便喝曰打脫明月前又曰左斷了也元臣居士病中感夢飯僧小參學般若菩薩法喜禪悅為樂是為真樂雲門大師曰一切智通無障礙拈起拂子曰釋迦老子來也可不是法喜禪悅之樂然事不孤起雲門當初肯無端說夢真如今日肯無端說夢驀喝一喝曰劃時打開兩片勢不能自已天中來底菩薩人中來底菩薩羊中來底菩薩一杓兩杓劈面擲三杓四杓如何當座中脫有箇不懼法塵底直下善得吾心自能顯諸神用天地此一夢也萬物此一夢也咳唾遍驗宗風此一夢也彈指永提法命此一夢也又喝一喝曰起沉痾消宿障何嘗不是此夢良久曰此夢此夢寂然不動感而遂通八橫七縱復喝一喝曰我此一眾如何受用曹侍御秋岳放生設齋上堂僧纔出師曰作麼生體盡萬類之情僧曰天施地攝其益無方師曰不可漠然無所報效僧曰豈盡蠢蠢之流師喝之僧亦喝師曰因此知是非常或者有爾語話分又僧問護生須是殺殺盡始安居此固是去底如何是住底師曰曩謨三漫哆沒陀喃進曰秪者便是保任麼師曰無人知此意僧一喝師曰你擬問五千天子那僧以目顧兩行曰一眾記取師曰好道去時亦似來時乃舉東山演祖上堂曰山僧今日將山河大地盡作黃金該有情無情總令成佛去然後東山不入者保社何故爭之不足讓之有餘師曰物之有待於我謂我至德神化廣洽潛通而未有能測者也演祖具如是深悲如是摯願如是神力如是奇變如是成就如是度脫如是利樂如是饒益行深般若之觀自在無過於斯但不應於空際中立分限其欲使盡天下深造夫大同無我之域不綦難哉爭似真如今日將使卵胎濕化一切含生驀喝一喝曰盡向者裏橫裂直用騰天潛泉淵淵浩浩各遂其情而真如初不曾出者保社亦不曾入者保社豈不一道平懷浩然大均復喝一喝曰將謂別有長處小參問還有不識祖師底人麼師驀豎竹篦曰尋常得此便僧曰也是仁義道中師曰劃斷即不可僧曰何患知之者寡師曰三十年後乃曰通明底人什麼物與麼來與他五箇餬餅三箇䭔咬著也由他咬不著也由他忽若問他缽盂匙箸與露柱相去多少他道尋常得此便不消與麼分開被山僧一時劃斷仁義道中為合如是不合如是良久云西天令嚴此土還較小參舉睦州上堂曰觀自在菩薩行深般若波羅蜜多時信受奉行問僧曰我適來念甚麼僧曰和尚念經州曰此老古錐心不負人面無慚色師曰咄這喫飯老得與麼滾滾沒碑記念到驢年也念不著正句真如有道補缺真言一時布施大眾驀豎竹篦曰諦聽諦聽上堂打鼓打鐘上來肯教兄弟負屈拈起拄杖曰不獲已共兄弟葛藤然終不敢撒尿著兄弟頭上有底見與麼說扼腕向前劈面一噓茫茫宇宙幾箇男兒仔細揀點有甚氣息或若不甘休更作箇伎倆難怪唐突直向道鋒鋩迅速總是癡頑萬里無雲青天猶在希罕甚照用同時人境俱奪會與不會都盧是錯驀拽拄杖下座晚參的的祖師命脈秪在當人舌尖頭上不是挨拶得來豈同石裏迸出喝一喝曰血滴滴地和心髓傾盡也自己固無慚色傍觀寧免驚疑有不重己靈蔑視諸聖底總不屑把眼相看好算他不是一員放常沒意智了事漢脫更依違顧瞻復喝一喝曰我也沒量罪過你也沒量過小參真如不敢欺罔賢聖埋沒兄弟僧出曰如何是真佛曰但莫憎愛洞然明白如何是真法曰兩箇蒸餅一斗好麵如何是真道曰你不問我我自著便又問如何是第一句更無上上第二句是何模樣若是第三句真如實誠不敢欺罔賢聖埋沒兄弟隨從容輪指曰拶到者裏把不住收來放去閑指注一百五十我自領七十二棒肯君恕張侍郎蘧林王方伯邁人項邑宰嵋雪錢別駕留史放生設齋上堂僧問山梁吐綬之姿春池吠月之質將宣無上神咒而呵護之還得超然獨脫也無師曰汝豈不知衝開盡是通霄路透出無非解脫門耶僧曰有與麼事那師曰何更疑謬僧曰是則杭翼婺印霞起雲蒸與昔日無異師曰誠非懷握之所玩僧曰昭然歷然無過於是師長吁曰五濁波濤海何人識此心僧問如何是大地眾生住處師曰蕩盡無量劫來隔岫之雲僧曰於真如分中還有些子相違處麼師曰更須豁開未生以前當空之日僧曰則無相光中常得顯現也師曰當為空王如來作禮乃曰觀世音菩薩以悲願力於一切眾生中現一切身而說法曰汝等沉溺以來今日昧昧明日蒙蒙妄緣前塵分別影事從劫至劫解脫無期今幸值遇其時好不與你方便隨喝一喝曰於剎那際得是無上頂王三昧廓然蕩豁洞徹十虛光明寂照充塞河沙出沒三界如日處空流轉六趣如雲投壑於來於去絕蹤由在天在人善時節復喝一喝曰各宜展布以報恩德小參極明白底事你等因什反不明白天地定位山澤通氣風雷相薄水火不相射得之於心不由外紛失之於旨前塵來使者箇是極明白底你等因什反不明白喝一喝曰參小參舉鼓山示眾僧出曰某甲咨和尚山曰吔僧曰輪中不得轉時如何山曰珍重拈曰一句超然又曰出古今之獨斷早參東方發紅照跨下床來大開眼了色色是兄弟自家屋裏事不解把得便用秪管來替真如討真如甚生不耐煩驀喝一喝曰莫怪粗糙小參禪子所重者我知其必不是缽飯盂水隻字片言則禪子所重者何禪子所重者曰戒曰定曰慧曰因果曰品行曰節義曰廉恥庶幾近之矣然則禪子真正所重何禪子真正所重者真佛真法真道真正宗師真正綱要是名真正學道人敢問兄弟何為真佛何為真法何為真道阿那箇是真正宗師喚什麼作真正綱要具何眼目是真正學道人記得我南嶽老和尚僧問如何是真佛曰相見何曾不注腳如何是真法曰豈是閒開兩片皮如何是真道曰勸君不用栽荊棘前三轉已為兄弟一口喝定也而今有問阿那箇是真正宗師向他道從你腳下過卻歸擲缽去也再問喚什作真正綱要莫聽他老禿奴顛言倒語至於真正學道人不道無只是少時有僧躍出曰聻便劈頭打下曰不見道才有所重便成窠臼良久曰來來我適纔道才有所重便成窠臼不是真如膽小替兄弟擔憂自是兄弟陷下麤心不明那竅且如何是那竅隨咳嗽一聲曰料掉料掉小參一向傍地為諸人著力今日勞倦之甚口嬾得開手嬾得動正擬放身睡去不曉事禪客揭簾直入咨上座如何是祖師西來意向道去去我今日勞倦甚你總不將為事便恁放過又豈干真如事小參離卻上來說處別行得一轉是名過量人直入尊貴路非僅僅從般若門解脫門涅槃門而來故能到處把扼要領恢廓無涯喝一喝小參離卻上來說處你便近前三步叉手當胸將謂是也我不是你將謂不是我卻是你秪者是不是處別尋諦實路三十年後猛然踏著豈止十萬迢迢小參離卻上來說處齒牙縫邊落出一段兩段不立孤危天然峭絕指擬他不得刻畫他不得逼仄他不得是他別無伎倆只是省徑省心喝一喝師誕日眾請小參白日青天下難為蓋覆伊三尺一丈六巍巍何巍巍是豈以報化之緣所可添飾法身邊量得而分疏據實商量父母所生之眼徹見盡大地是箇自己不謬纖毫渾焉周匝若也坐著白雲爭倒懸殊廓爾大喝一喝曰奮然提起燄燄莫邪太平寰宇更斬癡頑佛不干理道不涉事意句全銷人境俱奪上下前後左右那一處奈何得所以山僧有時赤肉團上壁立千仞有時十字街頭合水和泥向合水和泥處卻也千仞壁立向千仞壁立處卻也合水和泥到者裏遇明則暗遇賤則貴即不問秪如著高一著步闊一步畢竟是甚麼人隨擲下拂子曰且待須臾自當證知知事化柴回小參真如院裏第一句直是沒些子罅縫莫說在今踞曲彔水天下知識目瞪口呿便是馬祖百丈臨濟德山到者裏管取結舌有分秪為道不斷語言路不絕心智故驀拈拄杖曰者漢雖是生來條直卻也十分莽鹵不著思量無容擬議隨卓一卓曰一時滿口道盡直得開眼也是合眼也是橫拈也是豎拈也但可惜你諸仁一向麤心築著磕著處處打作兩橛又爭怪得小參凡有言說盡屬葛籐蕩盡目前依舊熱發喝一喝曰但秪不避來鋒直下提綱有路同參至上堂徵滹沱曆數起法運艱危非向那邊承當得卻來者裏橫三豎四坐一去七其何能金玉其聲雷霆其作上下二千年通貫七十代隨卓拄杖喝一喝曰秪此全機耀古今不須格外論奇特小參佛法大意地久天長大盡三十日小盡二十九天下衲僧漫脫空釋迦老子失卻口小參問僧他未彰名余不能取如何是空劫底自己僧曰須彌頂上擊金鐘師曰揭卻腦蓋又問風高月冷蕩盡來時如何是空劫底目前僧曰綠水光中古木清師曰錯認定盤星又問十字縱橫一真不立如何是目前底自己僧曰海門山長安道師曰誰是能舉又問倒翻森象罔辨蹤由如何是自己底目前僧茫茫煙水連芳草師曰照顧腳下僧卻問如何是空劫底自己師曰渾焉周匝如何是空劫底目前師曰廓爾懸殊如何是目前底自己師曰庭前柏樹子聻如何是自己底目前師曰兩重公案小參舉惕予方問曰山河大地一擊百雜碎舌覆三千底甚處插腳師曰直得寒毛卓豎彬遠曰真如門下師曰更待何時問颺一微塵普攝十方界眼似針鋒者如何履踐師曰今日明日彬遠曰風寒雨又寒師曰仔細好生看問是非不立凡聖絕蹤十字縱橫底何處蹲坐師曰無論晉魏彬遠曰相隨來也師曰更不再勘問歌躍青山雲水即闍黎不處人天者合居何國師曰以自展而無窒彬遠曰高高下下師曰實式臨之問建無生法因甚拄杖頭瞎卻衲僧眼師曰不可將為小小彬遠曰此話已行遍天下師曰遂以為常問震塗毒鼓因甚者隊漢主今命根不斷師曰不意問到者裏彬遠曰退後退後師曰付與驢年問越過佛祖底到者裏為甚不著便師曰官不容針彬遠曰某甲秪管看師曰留與後人貶剝問己者便請一轉師曰莫教屈著彬遠曰勾下屬何人師曰三千里三千里小參日來天氣寒冽滴水便是滴凍法報化身不可秪收攝在一處不因一事不長一智隨拈起拂子曰穿卻你鼻孔卻向腳跟下走出東西南北土曠人稀天上天下唯我獨尊復以拂子劃一劃曰十方世界百雜碎何處更有釋迦老子阿呵呵將此身心奉塵剎是則名為報佛恩小參喫了飯沒些子意智口懸東壁眼挂西山毫端許言之本末者皆為自欺雲從龍風從虎聖人作而萬物睹一華一佛國一葉一釋迦北鬱單越打鼓南贍部州上堂驀拈拄杖卓一卓曰靈山一會與今日何異祈雨小參盞子撲落地碟子成七片飛底飛上三十三天走底走入金剛輪水際穿過大雲輪寶樓閣中觸發輪蓋龍王恣意展無邊之用統彼持大雲雨疾行之者乘雲行者著雲衣者生雲中者能作雲者雲雷響者住雲中者雲天冠者雲莊嚴者乘大雲者雲中隱者雲中藏者披雲髮者耀雲光者雲圍遶者處大雲者雲瓔珞者向閻浮提界卷電奔雷擊山蕩壑直得陸地波濤從空涌沸山僧見伊作如是大神變事甚生歡喜踊躍虛空裏助伊箇霹靂驀震聲喝曰一舉直透無邊誰箇自甘泥伏小參萬里不挂片雲青天皎皎雖則目空宇宙過患全無真如秪是沒棒到伊喫何也翻不得箇副太虛面孔轉有甚麼用處驀拈拄杖卓一卓曰日月星辰一時黑也頂門上霹靂固是不妨驚眾腳跟下龍過還曾收得也未驀提袈裟角下座小參盞子撲落地碟子成七片事有赫赫於耳目之前不得從而掩之直心方杜其外求守己難稱乎大用動而能變變則不可測識隨喝一喝曰看看南山雲起也眾擬舉首復喝一喝曰看看北山雨下也眾又擬舉首乃倚拄杖笑曰汝能從事乎此無循乎跡以求其旨則山僧不得而欺之矣久晴瓦裂快些散去各各照管單頭自家的漏洞小參盞子撲落地碟子成七片鏘然泠然韻動崖谷視之既靜其聽斯遠觀世音菩薩急忙將籃裏底活潑鯉魚提起一吹乘風直飛上天去也良久曰要得雲行雨施且看日下三刻以上三則俱祈雨語小參響露鳴風載陳難辯蘇嚕㗭唎㗭唎蘇嚕深中淺淺中深妙絕無門擊禪床曰作者須知暗裏驚小參喝一喝曰令下急急日馳五百流沙浪闊熊耳山高雲從龍風從虎南北東西太莽鹵假使心通無量時總是者裏喫棒數小參豎起竹篦曰見之不采強作主宰見之卻采磕破腦蓋采而不采不采而采好箇三家村裏納稅漢你若夢得見三家村裏納稅漢朝旃檀暮沉水供養你咒願你且如何得夢見去彌勒覷不著釋迦說不得表見叢林非等閑千古萬古為規則驀擊一擊小參舉明覺見僧來拈拄杖云我兩手分付你作麼生僧退身云不敢覺曰為甚棒上不成龍僧曰三十年後恐孤負和尚覺放下拄杖曰吽吽師曰求其臨深履薄戰兢自持者蓋亦鮮矣者僧雖能慎始厥終可惜志有餘而氣不足雪竇擬釣金鱗爭奈清波不犯而今莫有乘風激浪者麼良久曰險小參舉僧問古德進一步時如何撞牆撞壁退一步時如何墮坑落塹不進不退時如何立地死漢師曰一隊一隊多見如此甚生苦屈今日設問真如進一步時如何天垂寶蓋退一步時如何地湧金蓮不進不退時如何曩謨觀世音菩薩曩謨大慈悲菩薩小參見應合眼聞莫舉頭固是禍不入慎家之門藥山何以弄獅子若道一切不是句山河大地甚處得來小參僧出曰有甚麼了期師曰嬴得泥人眼赤曰抬上抬下師曰不越於此乃豎起拂子曰文殊堂裏萬菩薩到處覓不得元來總在者裏秪贏得泥人眼赤將來有甚麼了期因事小參拈起拄杖曰看看作麼生門風如何圖度驀卓一卓曰思議不及處轉過者邊來十地滿心尚爾覓蹤跡不著那來名身句身與羊鹿之人平空描邈所以云活物不定傍來不紹但得此清淨光透過十方便能入淨入穢入彌勒樓閣入三眼國土鼓盪靈源神通遊戲到者裏畢竟作麼生是隨隨收放如事如理底句復卓拄杖曰一言截斷千江口萬仞峰頭始得閑舉遂首座立僧上堂稱提從上來事秪要攬得大綱在手縱橫展拓太虛不痕以空劫轉目前闍黎即是老僧以自己轉空劫老僧即是闍黎闍黎與老僧名不干事事不干名依執滯名與他玄隔驀卓拄杖曰盡乾坤口人到者裏百雜碎諸人或若不知問取堂中第一座小參缽裏飯桶裏水一言半句古人葛藤你兩無交涉僧出曰埋沒兩字未易道師曰坐是濫食那曰真箇不可思議師厲聲曰難道你便算得箇無慚愧人小參缽裏飯桶裏水塵沙諸佛千箇作團萬箇作塊牙如劍樹鋒稜稜底到口便百雜碎你道他還害痛麼眾屏息隨起身曰人無遠慮必有近憂小參直出他家尊貴路何緣合水更和泥僧出曰某甲粉骨碎身去也師曰還知三十三天那段事麼曰他亦不受師曰你看者驢漢良久乃曰擬有補于宗門不是一劫兩劫得休小參喝一喝曰風急急雨急急上下四維挨不入又喝一喝曰者裏挨得入四維上下無等匹復喝一喝曰試看祖宗標格小參立地決發黃河奔放一四天下饒你有逆浪上千里萬里底手腳不消一下子便退墮中流如何向者裏得箇入作喝一喝小參且不得麤心一例橫該抹將去道是坐斷天下人舌頭須知更有那竅在走道禪流秋風箭急既到我者裏切實向你說喝一喝曰且不得麤心小參雪雪盡大地作一句說冷似冰霜細如米末臨濟點著便知轉身走過新羅國德山你向伶俐何事愁眉不悅咄更要我說一句舌頭直是生鐵小參擬捏些與兄弟只恐兄弟走作一僧出曰諦實一路如何下腳師曰又肯東道西道曰則古今迢然也師曰好生去又僧出曰不辨大機若為建立師大聲曰我與上座有什冤仇僧罔然師曰者裏下得一轉盡乾坤無敵小參如何是真佛師曰鬧市一箇兩箇僧近前三步師曰見即不可僧拜下師曰長安雖樂小參九夏寒巖雪戛地清風三冬枯木花亙天霜燄美則美矣善則未善不見道談玄舉唱埋沒宗乘無說無言屈辱從上髑髏峰後即不問你馬鐙裏藏身道一句來無對乃拈拄杖曰昨見垂楊綠今逢落葉黃隨卓一卓小參雪雪大地山河無空缺沒得些子到我說大家團聚喫茶湯固是衲僧好時節小參看看春到也有甚饆饠䭔子快下將來若憚真如格致錯鍔旋生退縮有雙手伸不出有張口開不得可不錯過了好時好節沒奈何替你說秪為尋常茫茫地循一切境把山河大地草木叢林總屬別人屋裏物喝一喝曰直下來嘆奇哉捲盡五千四十八春風到處掌中開小參看看又是春風也野火燒不盡底槎槎枒枒包裹不來齊脫綻縱橫向背莫端倪正與麼時風暖鳥聲碎日高花影重是有句是無句良久曰不可教山僧更下注腳也小參青天敷翠色朝日含丹輝蕩盡目前紛綸不錯靠著自己過患寧無但不依他作解何妨顛倒如風眼孔沒遮攔腳頭忙蹴踏八萬四千應手開滿把珠璣亂拋撒拍案一下曰劄穀日小參一時從地涌出盡十方世界沒罅子空缺東來西來南來北來不問顆裏幾米米裏幾顆一任上載下載下載上載肯像他小家子說升合擔石話忽慢人限量人你禪和家聞三下普請鼓扁擔橫斫不開箇箇如王氣宇無論千斛萬斛一下傾在乂口裏擔得來始得擔不來餓殺你喝一喝曰我肯小當人佛日晦山和尚訃聞設供小參大統綱宗中事在風雲不測之中喝一喝曰晦山和尚來也直得乾坤震裂山岳動搖見汝諸人不猛著精彩卻歸佛日寺去也大眾一切馳求心歇無過斯時佛位祖位聖位賢位寶几珍御全不放在眼裏更說甚三身四智五眼六通所以直須識句若不識句難作箇話會且如何是句復喝一喝曰縱橫展拓氣如王慧業文章轉法光提盡古人之未到始知神化本無方小參山河無隔礙光明處處透拄杖子涌身虛空穿過南閻浮提北鬱單越腳跟下歷過無數坑坎堆阜土石諸山還依本位而住眼前綠水匹練橫拖背靠浮圖一錐迥卓衲僧道我會也忽若騎驢入爾缽囊裏牽牛入爾鞋袋中身背上知得些子輕重自不以真如無伎倆敗闕當風流小參拈起拄杖曰熱喫一頓出身白汗了指望一莖艸上現玉殿瓊樓那知遭人拶著卻又擔不出將山門來燈籠上底手腳蓋為尋常住在周匝有餘不解一轉一切轉如何得著著天地縣殊即今要與雲門相見但不遂物意移自爾雲興雷起赴笑隱臨行小參我意不欲與麼實是勉勿獲已隨拈拄杖連卓兩卓曰秪在一段一段擔得到人前不遍於理而適于事天上人間乾坤函蓋萬化千變逐浪隨波體淨用明無流不截復卓一卓曰後五日有人領得箇段節要始知真如不是閒和尚
