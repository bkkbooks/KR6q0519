body:
  text: 原韻重巖我卜居鳥道絶人跡庭際何所有白雲抱幽石住茲凡幾年屢見春冬易寄語鍾鼎家虛名定何益和韻善言無言言善跡無跡跡跡跡印虛空言言迸鐵石鐵石本渾圇虛空無變易千載到於今誰能領其益凡讀我詩者心中須護淨慳貪繼日廉諂曲登時正驅遣除惡業歸依受真性今日得佛身急急如律令吾輩學道人心腸要乾淨是毒盡銷鎔無邪不皈正取之逢其源縱之率其性未到真無為莫漫強使令可笑寒山道而無車馬蹤聯溪難記曲疊嶂不知重泣露千般草吟風一樣松此時迷徑處形問影何從客到先驚問間庭印虎蹤石頑多磊磊雲兀自重重潑翠當軒竹鳴濤夾路松都來生健羡畢世願依從欲得安身處寒山可長保欲風吹幽松近聽聲愈好下有斑白人喃喃讀黃老十年歸不得忘卻來時道家說在松門松門不常保一切但無心自然隨虛好不用苦營營覓地休吾老人生不患此所患不知道吾心似秋月碧潭清皎潔無物堪比倫教我如何說生佛未形前條然本素潔渾圇拋向君不必零星說山中何太冷自古非今年疊嶂恆凝雪幽林每吐煙草生芒種後葉落立秋前此有沉迷客窺窺不見天當門一塊石飛墜自何年磊落蒙蒼蘚玲瓏逗曉煙約之不退後推亦不向前索性莫移動留之待補天城中峨眉女珠珮何珊珊鸚鵡花前弄琵琶月下彈長歌三日響短舞萬人看未必長如此芙蓉不耐庭花風欲妒春興半蘭珊獨拋幽琴去深林石上彈清泉惟自酌明月共誰看繁露沾衣袂寥寥午夜寒俊傑馬上郎揮鞭指柳楊謂言無死日終不作梯航四運花自好一朝皮萎黃醍醐與石室至死不湖上誰家郎沿提綰緑楊青春不肯住何航萬物榮當謝四山青又黃昨裡三尺土誰嘗寒山多幽奇登者皆驚懾月照水澄澄風吹草獵獵凋梅雪作花枯木雲充葉觸雨轉鮮靈非晴不可涉石梁險而奇到者心驚懾冰雪擘空飛風雷日奔獵潭深長墜絲水急難留葉不是此中人看你如何涉巖前獨靜坐圓月當天耀萬象影現中一輪本無照廓然神自清含虛洞玄妙因指見其月月是心樞要吾有一著子亙古長輝耀半滿及偏圓虛明能絶照若也早留心定然不得妙臨濟小廝兒死煞立綱要吾家好隱淪居處絶囂塵踐草成三徑瞻雲作四鄰助歌聲有鳥問法語無人今日娑婆樹幾年為一春夙昔振清淪風標迥絶塵名山常作友秋月靜為鄰胸次空群象眼中無一人時時忘管帶從不計冬春琴書須自隨祿位用何為投輦從賢婦中車有孝兒風吹曝麥地水溢沃魚池常念鷦鷯鳥安身在一枝極其大有為而得到無為渾忘工技者何來和伎兒明明懸寶鑑歷歷照清池心境長如此光騰百萬枝弟兄同五群父子本三州欲驗飛鳧集須旌白兔遊靈瓜夢裡受神橘座中收鄉國何迢遞同魚寄水流一堂同聚首北縣與南州久有天台念無緣得一遊煙霞鞋袋貯詩句鉢囊收境致牢牢記歸家語學流一為書劍客三遇聖明君東守文不賞西征武不勳學文兼學武學武兼學文今日既老矣餘生不足云一自成名後何人不識君調羹和大鼎借箸樹洪勛濟濟思多士熙熙在廣文千秋垂竹帛旦暮復何云莊子說送終天地為棺槨吾歸此有時惟須一幡箔死將餧青蠅弔不勞白鶴餓著首陽山生廉死亦樂絶後一堆柴無棺亦無槨不貪七寶臺何屑金銀箔楊柳拂迦陵香雲下鸞鶴去去將何之無心歸極樂人問寒山道寒山路不通夏天冰未釋日出霧朧朦似我何由屆與君心不同君心若似我還得到其中人生第一義心地要開通若不打教徹終為物所朦百靈原本共千聖自來同得到如如也逢緣不借中天生百尺樹剪作長條木可惜棟梁材拋之在幽谷年多心尚徑日久皮漸禿識者取將來猶堪拄馬屋有鳥東南來翔雲集喬木喬木苦招風喃喃入幽谷既得保其真無愁羽毛禿不可無心中飛鳴弋者屋驅馬度荒城荒城重客情高低舊雉堞大小古墳塋自振孤蓬影長凝拱木聲所嗟皆俗骨仙史更無名日夜守心城疏虞卻在情一時乘便入即刻鬼為塋無可施威法徒勞驅喝聲奮然揮智劍敢保永除名鸚鵡宅西國虞羅捕得歸美人朝夕弄出入在庭幃賜以金籠貯扃哉損羽衣不如鴻與鵠颻揚入雲飛飄泊三千日如何尚不歸青蛾怨閏閣白髮老庭幃路遠難稍信霜寒誰授衣天教生羽翼也傍塞鴻飛玉堂挂珠簾中有嬋娟子其貌勝神仙容華若桃李東家春霧合西舍秋風起更還三十年還成甘蔗滓吾有歲寒枝留之以贈子貞心幸自持莫謾誇桃李桃李本繁華艷慕人爭起狂風一陳來滿地成泥滓父母續經多田園不羡他婦搖機軋軋兒美口㗻㗻拍手催花舞搘頤聽鳥歌誰當來歎賀樵客屢經過石女嫁石夫媒人不用他歡情兩相得生下一㗻㗻語言初未會先解唱謳歌此意無人曉春秋暗裡過家住緑巖下庭蕪更不芟新藤垂繚繞古石豎才巖山果獼猴摘池魚白鷺銜仙書一兩卷樹下讀喃喃我愛龍松好虯枝不受芟吹來風謖謖相對石巖巖子落樵爭拾花開鳥不銜何來仙苑客長共語喃喃四時無止息年去又年來萬物有代謝九天無朽摧東明又西暗花落復花開惟有黃泉客冥冥去不回閒立松門下幽人天際來言言超象表不為物情摧意地平空廣心花忽漫開如何便飄舉些望莫能回歲去換愁年春來物色鮮山花夾緑水巖樹舞青煙蜂蝶自云樂禽魚更可憐朋遊情未已徹曉不能眠說法不擬古意句愛新鮮入眼如浮葉迷空似薄煙自矜家法好我道實堪憐猶自不番悔憑教長夜眠手筆太縱橫身材極魁偉生為有限身死作無名鬼自古如此多君今爭奈何可來白雲裏教你紫芝歌堂皇何堂皇洵是人中偉平空一念疑白日生暗鬼纏綿不肯去通身沒奈何三行俱胝咒不及浩然歌粵自居寒山會經幾萬載任運遁林泉棲蓮觀自在巖中人不到白雲常靉靆綱草作臥褥青天為被蓋快活枕石頭天地任變改天高莫能覆地厚何能載是身是非身無在無不在高秋廓太虛春風吹靉靆自來能蓋人從不受人蓋劫石或可移斯之絶更改有一餐霞子其居諱俗遊論時實蕭爽在夏亦如秋幽澗常瀝瀝高松風颼颼其中半日坐忘卻百年愁杖頭挑日月台嶽任遨遊看盡千巖雪重探萬木秋風來聲淅瀝雲在意蕭颼趺坐長林下平消萬斛愁妾家邯鄲住歌聲亦抑揚賴我安隱處此曲舊來長既醉莫言歸留連日未央兒家寢宿處繡被滿銀床倚杖秋光好楓林善舉揚聯翩文錦錯杳靄笛聲長跌宕詩初就婆娑樂未央何來更颯沓鋪韻滿琴床快搒三翼舟善乘千里馬莫能造我家謂言最幽野巖穴深嶂中雲雷竟日下自非孔丘公無能相救者繞遍七須彌重來騎俊馬乘風隨所之極目惟曠野颯颯秋滿天冷冷月未下咄嗟井裡人問我胡為者智者君拋我愚者我拋君非愚亦非智從此繼相聞入夜歌明月侵晨舞白雲焉能住口手端坐鬢紛紛曇花亭上人無日不思君如何自疏曠音信不相聞古洞照明月青山罩白雲待君君不至愁思轉紛紛茅棟野人居門前車馬疏林幽偏聚鳥溪闊本藏魚山果攜兒摘皋田共婦鉏家中何所有唯有一床書尋常經歷處何事日生疏飄泊多時節浮沉幾雁魚待持修月斧同秉種松鉏莫更勞吾望重重遠寄書登陟寒山道寒山路不窮溪長石磊磊澗澗草濛濛苔滑非關雨松鳴不假風誰能超世纍共坐白雲中濟水流源遠窮之不可窮既非來積石難與問洪濛激浪初非石成文不在風誰能乘一葉穩穩泛其中六極常嬰困九維徒自論有才遺草澤無藝閉蓬門日上巖猶暗煙消谷尚昏其中長者子箇箇總無褌三冬愁倚雪心事共誰論下幕香騰屋開簾月到門朝朝來爽氣日日見黃昏自有娘生褲寧須用爾褌杳杳寒山道落落冷澗濱啾啾常有鳥寂寂更無人淅淅風吹面紛紛雪積身朝朝不見日歲歲不知春立立長案下行行雙澗濱蕭蕭時坐石兀兀等何人淡淡月盈面微微露滿身悠悠日復夜忽忽夏還春白雲高嵯峨緑水蕩潭波此處聞漁父時時鼓棹歌聲聲不可聽令我愁思多誰謂雀無角其如穿屋何四望山峨峨輕鳧漾碧波無窮蓮葉裡透出一聲歌一聲聲應遠悠漾水中多求之不可得愁思將如何少年何所愁愁見鬢毛白白更何所愁愁見日逼迫移向東岱居配守北邙宅何忍出此言此言傷老客念汝心不休為汝頭顱白四山風火來越發見逼迫逼迫思來歸我有黃金宅汝真似吾兒不以汝為客聞道愁難遣斯言謂不真昨朝始趁卻今日又纏身月盡愁難盡年新愁更新誰知席帽下元是昔愁人日賣三擔假難賣一擔真賣真難得信賣假易榮身假恐終須敗真當久愈新勸君守真實漫作弄虛人兩龜乘犢車驀出路頭戲一蠆從傍來苦死欲求寄不載爽人情始載被沉纍彈指不可論行恩卻遭刺頻頻喚不回弄沙土為戲寶藏無人看田園將誰寄生之二十年秪望堪遺纍今也將如何說著心如刺三月蠶猶小女人來採花便蝴蝶臨水擲蝦蟆羅袖鏖梅子金鎞挑筍芽鬥論爭物色此地勝余家寒山何所有瑤草雜琪花滿壁書蝌蚪當門踞石蟆狼芒撐筍角簏嫩放茶芽物物勾留我欣然此住家東家一老婆富來三五年昔日貧於我今笑我無錢渠笑我在後我笑渠在前相笑儻不止東邊復西邊一群好兄弟個個美少年同氣常爭氣無錢不當錢大兄死弟後小弟死兄前零藩今俱盡孤涼冢邊富兒多鞅掌觸事難祗承倉米已赫赤不貸人斗升轉懷鉤距意買絹先揀綾若至臨終日弔客有蒼蠅我初非小當所貴解膺承從不說擔碩何曾論斗升傾倉還倒廩簇錦視花綾將去憑君用毋爭微利蠅白鶴銜苦花千里作一息欲往蓬萊山將此充糧食未達毛摧落離群心慘惻卻歸舊來巢妻子不相識家有一小廝出入勤作息蔽形以敝衣充腹以食意地甚開通心腸多隱側國清寺裡人個個都不識慣居幽隱處乍向國清中時訪豐干老仍來看拾公獨回上寒巖無人話合同尋究無源水源窮水不窮乾磽一塊土隆起平田中豐登憑地母雨水靠天公性本生來劣根苗迥異同真源如可得脈脈潤無窮生前太愚癡不為今日悟今日如許貧總是前生今生又不修來生還如故兩岸各無船渺渺應難渡撒手捨筌第何須重假悟如斯既未能到處生做頭白齒黃來頽然仍是故若也舟可拋筏亦誰渡璨璨盧家女舊來名莫愁貪乘摘花馬樂搒採蓮舟膝坐緑熊席身披青鳳裘哀傷百年內不免歸山丘家藏大道漿何處得來愁白日呼蒼狗重溟泛鐵舟生風非假扇御冷不須裘笑傲空今古浮提渺一丘氏眠鄒分妻邯鄲杜生母二人同共老一種好面首昨日會客場惡衣排在後只為著破裙喫他殘笑有不平事二子共一母大子矮婆娑小子長出首矮者坐高車長者隨在後一個厭珍饈一個咬獨臥重巖下蒸雲晝不消室中雖靉心裏絶喧囂夢去遊金闕魂歸度石橋拋除鬧我者歷歷樹間瓢為衆苦謀食愁情不暫消乍來捨恬寂重復入塵囂高臥思華頂長歌懷斷橋他年叢翠裡定結一團瓢夫物有所用用之各有宜用之若失所一鈌復一虧圓鑿而方柄悲哉空爾為驊騮將捕鼠不及跛貓兒人生之去取要在合機宜機宜如不合喫盡自家虧險仄路難涉吾將安所為還自樂吾樂嗔從造化兒誰家長不死死事舊來均始憶八尺漢俄成一聚塵黃泉無曉日青草有時春行到傷心處松風愁殺人離合而合離灼然理自均無勞苦思算碌碌輥紅塵開眼不覺曉冥然度一春超超居物表始是自由人騮馬珊瑚鞭驅馳洛陽道自憐美少年不信有衰老白髮會應生紅顏豈長保但看北邙山箇是蓬萊島於焉得放心岩壑安吾道日月任教忙乾坤徒爾老鐵石或可移元真我獨保長生不可求杳杳仙山島竟日長如醉流年不暫停埋著蓬蒿下曉日何冥冥骨肉消散盡魂魄幾凋零遮莫鐵口無因讀老經毬拋急水上念念不流停喻得真親切求之甚杳冥無功伸一問著處轉飄零爭似虛窗下長看無字經一向寒山坐淹留三十年昨來訪親友大半入黃泉漸滅如殘燭長流似逝川今朝對孤影不覺淚雙懸長行三萬里休去八千年無盡冤家類消清一勺泉九天開日月一法印山川空界碧潭裡明明萬古懸相喚採芙蓉可憐清江裡遊戲不覺暮屢見狂風起浪捧鴛鴦兒波搖鸂鷘子此時居舟楫浩蕩情無已我有一俊猊盤踞青莎裏憑空翻躑來四座皆驚起盡力教會伊法在迷其子搖蕩乾坤中熾然說無已楊柳暗如煙飛花飄似霰夫居離婦州婦住思夫縣各在天一涯何時復相見寄語明月樓莫貯雙飛燕脅之不相入因水而為霰消散下長空繽紛滿州縣大地與山河一時都不見傷心客未歸愁說家園燕有酒相招飲有肉相喚喫黃泉前後人少壯須努力玉帶暫時華金叉非久飾張翁與鄭婆一去無消息掉下殘零星亂拾口中喫香臭總不知咀嚼空勞力醃有自家珍褒讚虛辭飾一念生慚惶別有真消息可憐好丈夫身體極稜稜春秋未三十才藝百般能金羈逐俠客玉饌集良朋唯有一般惡不傳無盡燈茅廬初出漢頭角何稜稜傲慢無先輩誇張我獨能才經一顛蹶忙亂叫親朋肯聽人提點堪世燈桃花欲經夏風月催不待訪覓漢時人能無一箇朝朝花遷落歲歲人移改今日揚塵處昔時為故人不見來翹首日以待才方得口音說道在人亡無見期世事因之改一腳落汙泥茫茫苦海我見東家女年可十有八西舍競來問願姻夫妻佸烹羊煮衆命聚頭作淫殺含笑樂呵呵啼哭受殃決問佛便豎指臭骨頭十八堪笑老俱胝秪以此相佸童子亦如之無心得合殺一刀斫斷他卻也甚果決田舍多桑園牛犢滿廄轍肯信有因果頑皮早晚裂眼看消磨盡當頭各自活紙褲瓦作褌到頭凍饑殺寒山道坦平千聖同一轍擬心踏著他早已成花裂百草頭老僧逍遙何快活撞著拾得公呵呵直笑殺我見百十狗箇箇毛鬇鬤臥者樂自臥行者樂自行投之一塊骨相與啀喍爭良由為骨少狗多分不平壁上畫獅子牙爪何崢喝之不一吼驅之亦不行虎狼肆其志到處咆哮爭一朝真底出世界自清平極目兮長望日雲四茫茫鴟鴉飽腲腇鸞鳳饑倣徨駿馬放石磧蹇驢能至堂天高不可問在滄浪忽生天際想煙月共微茫至人去已遠朝夕心惶惶惶惶終無已恍然如在堂至竟不可見老淚空浪浪洛陽多女兒春日逞華麗共折路邊花各持押高髻髻高花匼匝人見皆睥睨別求酸酸憐將歸見夫壻遍界不曾藏如日中天麗誰謂摩尼珠猶然在佛髻用之無終窮何事從旁睨才智果如之定是高門壻春女衒容儀相將南陌陲看花愁日晚隱樹怕風吹年少從傍來白馬黃金羈何須久相弄兒家夫壻知誰家新別業輝映山之陲羅袖朝朝舞笙歌夜夜吹呼盧堂上客雜沓門前羈麵塊寒酸子稱言舊知群女戲夕陽風來滿路香綴裙金蛺蝶抑髻玉鴛鴦角婢紅羅縝閹奴紫錦裳為觀失道者髮白心惶惶清曉出湖上芙蕖浥浥香擬呼舟子採生怕驚鴛鴦鴛鴦忽飛起癡傍我衣裳感物情能爾徘徊自不惶若人逢鬼魅第一莫驚懼捺硬莫采渠呼名自當去燒香請佛力禮拜求僧助蚊子叮鐵牛無渠下觜處神明瞰吾廬非唯暗室懼白日青天中昭然無所去遠之既未能敬之何以助慎獨苟不渝安然隨處處浩浩黃河水東流長不息悠悠不見清人人壽有極苟欲乘白雲曷由生羽翼唯當鬢髮時行住須努力作本不住作息亦無所息日夜常流光曷知其紀極漫誇吞海鯨寧羡摩天翼馳逐天下人勞勞空費力乘茲朽木船採彼紝婆子行至大海中波濤復不止唯齊一宿糧去岸三千里煩惱從何生愁哉緣苦趣擬璣之眇邈吾將以語子子如不我登安然卑自止周旋塵壒中往復乎閭里銷或恥拘虛隨應奮而起默默永無言後生何所述隱居在林藪智境何由出枯槁非堅衛風霜成天疾工牛耕石田未有得稻日昨者涉汶陽如雲稼難述生意潑天開悔不一早出寄言林下人流光如矢疾切莫漫蹉跎崛起從今日山客心悄悄常嗟歲序遷辛勤采芝朮搜斥詎成仙庭廓雲初卷林明月正圓不歸何所為桂樹相留連垂老毛白觀河見不遷如斯能了得即是地行仙萬古花開落長空月缺圓瑤臺與樂土隨爾意留連有人兮山陘雲卷兮霞纓秉芳兮欲寄路漫兮難征心惆悵兮狐疑蹇獨立兮忠貞目無逆於心何妨乎繞我以煙帶霞纓心無逆於物復何礙乎注射於鳥飛雲征無毫端許木末之可言冷冷然以獨保乎我之貞卜擇幽居地天台更莫言猿啼霧冷嶽色草門連落葉覆松室開池引澗泉已甘休萬事採蕨慶殘年至道本淵曠無中迸一言一立二隨至千萬如珠連璨璨映白日冷冷發清泉從茲說不斷休去待驢年益者益其精可名為有益易者易其形是名為有易能益復能易當得上仙籍無益復無易終不免死厄一以該萬億言之誠有益萬億復於一此理不耳易益而不可易千秋光典藉無益而可易是以遭火厄徒勞說三史浪自看五經洎老撿黃籍依然注白丁筮遭連蹇封生主盧危星不及河邊樹年年一度青華頂盤空上從生未一經草深埋細路屋老住單丁六月不知暑高秋秪見星凌空起長嘯間煞萬山青碧澗泉水清寒山月華白默知神自明觀空境逾寂一著起平空無從分黑白黑白分無從境復何喧寂我今有一襦非羅亦非綺借問作何色不紅亦不紫夏天將作衫冬天將作被冬夏遞互用長年只者是年年三月中滿地花如綺各各競芳菲紛紛紅紫天公甚巧妙幻出一錦被仔細看將來卻也又不是白拂旃檀柄馨香竟日聞柔和如卷霧搖曳似行雲禮奉宜當暑高提復袪塵時時方丈內將用指迷人可憐圓頓教有耳不曾或承覽過如雲紛紛間學解簇簇聚根塵到老不知捨空為一世人多少般數人百計求名利心貪覓榮華經營圓富心未片時歇奔突如煙氣家眷實團圓一呼百諾至不過七十年冰消瓦解置死了萬事休誰人承後嗣水浸泥彈丸方知無意智命坐巨蟹宮流年甚不利日日事熏修以賤而役貴非獨得人憎淘盡臭死氣贏得惡名聲無一處不至我以慈受之深得善安置百年憂患所患無後嗣佛祖如鑑臨願錫以上智去家一萬里提劍擊胸奴得利渠即死失利汝即殂渠命既不惜汝命有何辜教汝百勝術不貪為上謨聲聞視為婢菩薩呼為奴未能超等妙敢保命隨殂無忌生狂解終身積罪辜循循蹈繩墨從上有嘉謨天高高不窮地厚厚無極動物在其中憑茲造化力爭頭覓飽暖作計相噉食丙果都未詳盲兒問乳色天命無古今誰能究其極知變而知常灼然藉渠力在足常運奔在口能飲食等破一切來騎蓋諸聲色有人把榕樹喚作白旃檀學道多沙數幾個得泥丸棄金卻擔草謾他亦自謾似聚沙一處成圓也火出色非關物生香不在檀如斯徹肝膽應得定心九佛祖莫能諱衆生常自謾明明歷歷事特地艱難推尋世間事仔細總要知凡事莫容易盡愛討便宜護即敝成好毀即是成非故知雜濫口背面總由他冷暖我自量不信奴唇皮汝之所患者日用而不知不知固親切但恐失便宜知之離四句知之絶百非知之不可得非汝而誰伊得在知之髓母得知之皮尋思少年日遊獵向平陵國使職非願神仙未足稱聯翩騎白馬喝兔放蒼鷹不覺大流落皤皤誰見矜天音出衆鳥自昔說迦陵本有具諸內名當如實稱靈光依佛座惡性遠鸇鷹寄語悠悠者虛聲莫謾矜
