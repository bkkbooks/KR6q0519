body:
  text: 侍者力端等録上堂拈香云此一瓣香從正法眼藏中流出成清淨輪供養始祖釋迦牟尼文佛伏願龍圖丞奠鳳常新此一瓣香從涅槃妙心中流出成光明輪供養歷代開法宗師暨本寺開山第一代韶國師及皇明中興天童悟祖老和尚惟冀孫枝繁衍正法昌明此一瓣香從實相無相微妙法門中流出成處處無礙淨光明輪供養中興國清後住靈巖慈受閣上本師退翁和尚用酬法乳之恩上首白椎竟僧問鳥啼花笑滿目青山莫便是沒量大人住處麼師曰一段因緣天上來僧云其中事作麼生師云不屈宗乘遭逢有據僧禮拜師云也須親到者裏一轉始得乃云一著憑空起古今硬剝剝為佛祖師活卓卓開人天眼驀拈拄杖云看看通玄拄杖化為龍吞卻乾坤世界雲門大師忍俊不禁道學我者拙似我者死被山僧劈頭一棒直得飲氣吞聲何也行到定然能說到得親自爾用來親舉韶祖偈云通玄峰頂不是人間心外無法滿目青山悟祖曰通玄峰頂別是人間秪緣不薦錯認青山師曰若也蕩盡目前自得眼空宇宙依然靠著自己寧免局於方隅新通玄不圖炫耀己靈秪貴稱提從上乃云通玄峰頂高出人間腳頭到處占斷青山靠拄杖下座上堂通玄峰頂風雲不次不是人間日月有恆心外無法從他逼塞虛空滿目青山覓甚纖毫過患上堂香爐峰氣融融千秋月萬古風驀拈柱杖曰劃破重重錦縫好看寶印當空上堂青山無異路步步絶回互直上通玄峰茫茫空四顧上堂舉溈山普請次此外更有何法靜板鳴幾曾鎖斷奔馳一僧撫掌呵呵大笑歸去不屬漸次如何通信溈曰此是觀音入理之門卻為虛空鑽耳穴至晚間問其僧又將泥水滯春風你見甚麼道理實誠不敢相欺僧曰朝來未喫飯聞板聲歡喜直得天下歸仁溈曰賺殺人才有纖毫萬劫不如此溈山之所以爾也頌曰萬里眼開泥水路飛騰直上無回互朴落非他仍是渠佛墮祖墮菩薩墮天童悟祖忌日上堂一著憑空風行雷厲千機頓赴嶽撼波騰只者是從上先宗立命之神符據要之關節若欲克繩祖武遠紹門風不是將一轉來博一下去直須向和聲送出時兜底掀翻渾身放倒處連贓捉敗縱具恁麼手腳做他烜赫兒孫正未可在隨拈起柱杖云看看悟祖一生用不盡底得到通玄手中轉換落落地定點窄之淆訛控馳縱之去住你獨角擎天來我當頭拽脫你你四稜踏地來我首尾收據你你涌現瓊樓王殿來我盡情折卸你你擁駕銀山鐵壁來我立地推倒你你四方八面來我旋風打散你你開旗展陳來我乘間擒住你總不恁麼來撾動塗毒鼓八萬四千毛竅竅竅如金剛鑽擂來擂去三百六十骨節節節如奪命丹攻上攻下然而不立死者未之有也衆中有箇是他腳下滴血孫子出來道通玄將一棒恁樣搬弄是則是但秪下手不緊何也如載一車寶劍將一柄出來用了又將一柄出爭如我秪消寸鐵卻能殺人通玄便隨聲問他你底寸鐵聻他若擬議便與劈頭一棒云我者箇一向縮在指甲縫裏你說的確長幾許悟祖見與麼登答笑口扯開十丈曰諸供養中法供養最是真精進是名真法供養不待三十年後敢保此話大行禪堂上梁小參拈拄杖卓一卓云踏在這個區處直須具有逼死蛇化神龍之手腳若不具有逼死蛇化神龍之手腳土石磚瓦安能使之放光動地跨入個條門限直須具有點頑鐵成精金之本事若不具有點頑鐵成精金之本事竹頭木屑如何教他作用通天所以云法無定相遇緣即宗道不虛行因人而顯山僧忝紹悟祖之門風拈起拄杖云合行悟祖之法令死蛇來也與三十神龍來也與三十放光動地底來也與三十頑鐵來也與三十精金來也與三十作用通天底來也與三十直得山河大地草木叢林是佛是祖若聖若凡都盧打成一片并這一片亦教纖塵不立然後從處處無礙淨光中突出向上全提一句如杲日之麗長空若冰輪之臨廣莫是汝諸人還彀得著也無若彀得著則見我天童老祖涌身通玄峰頂高十萬八千丈其或未能且看生面開今日別有聲光在後時上堂是法住法位拈拄杖卓一卓云此通玄峰頂是諸人所依住之法位也若耽住此玄縱得虛明自照不是通玄峰頂直饒不依住此玄亦無不依住知解亦未是通玄峰頂且如何是通玄峰頂登之不假白雲梯自在全提向上機上堂諸人總道得到我之通玄峰頂還見通玄峰頂也未若真個得見我之通玄峰頂且問你如何是通如何是玄如何是峰如何是頂有者道處處淨光無礙之謂通頭頭妙葉無方之謂玄玲瓏峻拔無極之謂峰空明廖廓無上之謂頂此是人間之通玄峰頂非不是人問之通玄峰頂不是人間之通玄峰頂畢竟是何人得到擬心早已落平地卓拄杖云迥絶扳躋秪是他上堂問通玄峰頂是何面目師云若有面目則非通玄曰何以廬山有真面目乎師曰汝身在此山中耶乃云若有一人發真歸元十方虛空悉皆銷殞不是通玄面目見見之時見非是見見猶離見見不能及亦不是通玄面目一切智智清淨無二無分無別無斷亦不是通玄面目扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾亦不是通玄面目觀世音菩薩將錢買胡餅放下手來卻是饅頭亦不是通玄面目若然者則通玄之面目畢竟不可得而見也秪者畢竟不可得見底莫便是否隨呵呵大笑曰通玄非面目面目非通玄淵淵其淵浩浩其天者個決不是通玄上堂到頭無路是通玄峰頂猶然在半天到了通玄重到頂方知無路是通玄上堂舉五祖演和尚示衆人之性命事第一須是我有知乎哉欲得成此無知也先須防於有鄙夫問于我若是真空空如也人叩其兩端而竭焉頌曰頭固不缺尾亦不剩竭盡兩端透出性命上堂舉五祖演和尚示衆人之性命事第一須是待渠轉過身來欲得成此另自與伊方便先須防于正坐不當堂因我得禮你若是真從這裡倒從這裏起人明暗雙雙是何道理頌曰從這裡倒從這裏起明暗雙雙是何道理上堂舉五祖演和尚示衆人之性命事第一須是渾焉周匝欲得成此廓爾懸殊先須防于情不附物若是真一切智智清淨人無二無分無別無斷頌曰天上月圓人間月半無二無分無別無斷上堂舉五祖演和尚示衆人之性命事第一須是靈光獨耀欲得成此迥脫根塵先須防于不拘文字若是真本自圓成人即如如佛頌曰本自圓成誰是得者喚作如如早變了也大悲聖像起工上堂盡森羅萬象是大悲光明幢是大悲千手眼是大悲無礙心是大悲陀羅尼喝一喝曰從這裏一時成就慧身自爾不由他悟不由他悟則現儀皆法法莫大於得其本本立則道生道生一一生二二二生三三生萬物喝一喝云雷奮青霄枝枝撐玉復喝一喝曰雲垂大地葉葉鏘金又喝一喝曰如意寶珠從信得放開仙掌快擎來老和尚十周忌上堂三千六百日以前盡大地是一口太阿劍攖之者命根立斷三千六百日以後太阿劍是一箇盡大地磕著底毛骨不留正當三千六百日半勺清泉一炷香平易處煞有淆訛確實處不無商量何也南嶽門中事貴奇正以相生在淨光而變奪於此奉重死者生儼然灼見分身之舍宅在於隱身於此背馳生者死無數爭知立命之先驅在於奪命驀拈拄杖云老和尚來也將盡大地是一口太阿劍按在手上以太阿劍是一箇盡大地陷在腳心爾諸人向甚麼處出頭作麼生相見卓一卓云不得通玄開線道是誰敢踏頂門行上堂舉寒山因趙州遊天台路次相逢山見牛跡問曰還識牛麼州云不識山指牛跡曰此是五百羅漢遊山州云既是羅漢為甚麼卻作牛去山曰蒼天蒼天州呵呵大笑山曰作甚麼蒼天蒼天山曰這廝兒宛有大人之作師曰大小寒山與這夥廢忘不通利底在牛跡裏頭出頭沒自謂遊戲神通成就衆生淨佛國土帶纍十八上破家散宅底老兒苦苦叫斷蒼天而蒼天不為之應卻又飾辭褒贊以為宛有大人之作乃拈起拄杖云通玄今日將這夥撩天鼻孔一時穿卻收也不離我者裏放也不離我者裏且道者裏是甚所在卓一卓曰須知雲外無雲處別有通玄一段奇上堂舉拾得一日掃地次寺主問汝名拾得因豐干拾得汝歸汝畢竟名箇甚麼姓箇甚麼拾得放下苕帚叉手而立寺再問拾得拈帚掃地竟去寺主罔測寒山捶胸云蒼天蒼天拾得問汝作甚麼山曰不見東家人死西家助哀二人作舞哭笑而去師曰拾得本生名氏雖則陳露昭昭其奈天不可得而象地不可得而形一念普觀無量劫底亦不可得而知無怪乎寺主之茫然也寒山枉著哭笑一上至竟注疏不出隨回視一衆云且道拾得畢竟是何名氏良久云待虛空落地時即向汝道上堂舉寒山因衆僧灸茄次將茄串向僧背上打一下僧回首山呈起茄串云是甚麼僧云這風顛漢山向旁僧云這漢不知費卻我多少鹽醬師云寒山落得費盡鹽醬這漢到底不知滋味旁僧徒自咽津橫豎嚼他不著可惜這許多茄子堆爛在常住地面此段罪過不同小小諸人還識這風顛漢麼驀拈起拄杖云是甚麼上堂舉溈山靈祐禪師至國清受戒才到松門寒山與拾得從路旁透出作大蟲吼三聲祐屼然無對寒山云自從靈山一別直至而今還相記麼祐亦無對拾得拈起拄杖云老兄喚者個作甚麼祐又無對山云休休別後伊三生為國王總忘卻也師曰寒拾在三世國王面前竭盡本事露盡丹衷冀其敦故舊之誼續夙昔之歡安知彼自以尊嚴無上而不為之睬聽一片心機白白送在水裏雖然我要問他這兩箇咆哮大蟲畢竟作麼生攝伏個條殺活拄杖畢竟作麼生拈弄不見道聲色之於化民末也兵者聖人不得已而用之是知端拱無為垂衣裳而治天下者其唯堯舜也歟癸亥元旦上堂僧問爆竹一聲催臘去人人盡道是新年新之與舊是同是別師拈起拄杖云莫認這個作實法僧云則於法自在而無黨無偏也師云擊碎目前無剩跡歸元逞物任施為僧云榮發一切端在斯時師曰背面總提如不見青青黯黯那邊看僧一喝師曰鼓角動也乃云盡天下人總道今朝是第一個日子既知是第一個日子則知有第一時分第一時分中有第一義諦第一義諦中有第一三昧第一三昧中有第一句子隨震威一喝云此一句子雖從第一三昧中而生而不為第一三昧之所攝不為第一義諦之所詮不為第一時分之所收不為第一日子之所該而能該第一日子收第一時分詮第一義諦攝第一三昧有如是第一威德有如是第一自在有如是第一奇勝有如是第一神變故得如獅子之高步衆會如慧日之照燭中天如雷霆之榮發萬物如春波之捷赴大川千聖挹其光華群生被其至化尊之為萬象主而不自專於萬象推之為第一人而不自居于第一煥乎其有文章巍乎其有成功蕩蕩乎吾無得而名焉大士開光玉京潘進士請上堂菩薩本有心光亙古亙今通天徹地何籍重新開點而後顯諸神用耶東震旦天台支提山通玄沙門不敢增益毫末于春風浩蕩時謹即以廣大圓滿無礙大悲心流出一切智智清淨之光還復納之頂門正眼以及通身遍身八萬四千爍迦羅眼隨以拂子向空點云看看其光晃耀如紫金山千日並照所不能及光之色相種種不同別異無量或如如意珠焰輪掌上舒或如垂罥索已解諸有縛或如應量器積貯無上味或如按莫邪照雪倚天遮或如跋折羅摧伏諸邪魔或如金剛杵怨敵無能拒或如施無畏顯發其正氣或如日摩尼幽暗生光輝或如水月晶熱惱得冰清或如架弓箭神機速於電或如楊柳枝甘露灑隨宜或如白玉麈縷縷隨風舞或如琉璃瓶注水聲冷冷或如執旁牌禍祟自推排或如擎斧鉞威嚴不可說或如碧玉環溫潤且斕斑或如寶蓮華皎潔無纖瑕或如寶瓔珞千光互交錯或如大圓鏡智智同清淨或如合笥篋全璞好藏挾或如五色雲鸞鳳舞紛紜或如提軍持高步梵天時或如吹法螺法令聽摩訶或如擊法鼓歷亂心花舞或如張傘蓋覆護于在在或如持數珠圓明意自如或如秉寶鐸拔苦與之樂或如紫玉璽提持能徹底或如火焰輪爍彼諸群昏或如扶几杖至頂高無上或如胸合掌翹勤無異想或如頂化佛端嚴甚殊特或如展經卷親對黃金面或如化宮殿不隨胎藏轉或如不退輪堅固菩提身或如與髻珠摩頂在須臾或如葡萄朵繁盛其果蓏或如灑甘露無處不遍布而今總攝持斯文實在茲如是種種光具含千手眼一一手眼中長放無量光無量攝一光一光復無量交羅其光光猶如寶絲網是知垂慈願普絶無不了之因緣仰籲情深安有虛應之果報因緣會遇果報斯彰因而無量光由之以開顯以拂子點一點云不離此一光垂慈願普無虛仰籲之深情仰籲情深自得垂慈之普願因而無量光由之以交感又以拂子點一點云不離此一光華雲涌處瞻禮翹勤光相垂時蒙恩果遂其開顯也原無剩跡其交感也安可思議此之大悲境界以廣大圓滿無礙為歸向從畢竟同成畢竟異從畢竟異歸究竟同如靈源濬脈散萬派而還共朝宗似精魄流光影百川而原非二月隨以拂子點一點云也不離此一光放下拂子云而今收此一光還歸拂子從教一切智智清淨之光如雲如蓋覆汝諸仁頂門盤旋而不散莊嚴玉翁護法上堂喝一喝云此是頂王三昧其得之者無不兼容并包謂其廣大也廣大出主其中謂其圓滿也圓滿不越于外謂其無礙也無礙通于中外而中外之中外無得而擬也其無礙也為何如其圓滿也為何如其廣大也為何如到者裏扯個心包太虛量周沙界來配合直滄溟之一粟耳若然者則廣大也我廣大之圓滿也我圓滿之無礙也我無礙之與過去正法明如來何預焉若與過去正法明如來有預而玉翁所生之國土殊勝品位隆崇則非過去正法明如來之所致以其與過去正法明如來無預故玉翁所生之國土殊勝品位隆崇莫之為而為莫之至而至也且畢竟功歸何所復喝一喝云不可不謂之至也上堂舉韶國師初參法眼因僧問法眼如何是曹源一滴水法眼云是曹源一滴水韶聞豁然開悟師云曹源一滴水瞪目不見底一葉落當風波浪滔天起諸仁還知韶國師麼揭開心外原無法快見壺中別有天上堂香爐峰瑞靄騰騰擂鼓洞圓音歷歷有眼如盲有耳如聾底到來作麼生與伊個方便乃拈拄杖卓一卓云千年桃核裏幸有舊時仁上堂聲前活路大海不宿死尸劫外靈機噴喋輥出師子呵呵呵囉囉哩天上人間知幾幾上堂拈起拄杖云歷劫不知名卓一卓云古今收不得橫按云千聖立下風以手彈三下云誰敢當頭上堂炎炎赫日爍石流金虛空藏菩薩善得安身法門上高山下平地撞著道伴交肩過喚轉頭來與伊個護身符子止止不須說我法妙難思上堂過去諸如來斯門已成就清涼幢子高多少現在諸菩薩今各入圓明琉璃殿上行撲倒也須粉碎未來修學人當依如是法拈拄杖卓一卓云無量義中時一說渾家遂上渡頭船上堂一徑直二周遮衲僧會得撒土拋沙捏出祖師心髓五色披離似鳳努開菩薩面孔千般綽約如花不解慎初空護末放教長笛出煙霞上堂舉應菴華禪師示衆云盡力道不得底句不在天台定在南嶽師云玄關瞥轉佛祖難窺正紐傍提人天罔測通玄有箇道處南嶽天台句非句走盤珠向空中住上堂有佛處不得住枉向這條路上打箇回合無佛處急走過空教草鞋底脫三千里外逢人不得錯舉無妨無妨恁麼則不去也從來姿韻愛風流摘揚華摘楊華生涯簇綻憑君意須是成家解破家弟子姚文煥萬偉請為尊慈三七對靈升座追本報所生無越於啓悟十地頓然超寧復淪諸趣請我為敷揚諦聽我示諭以拂子擊案一下云具是大勇識等破一切句一切了無依自復其本素火熱風動搖水濕地堅固然於一一法根莖枝葉喻雲礽不可量一花一佛土赫奕起真宗是處大光裕偉業煥文明法燈亦分布灌溉心地開香乳乘空注佛佛而母之何取人天路忉利花雨飛繽紛無旦暮泳遊性海中緣感隨相赴機致正繁興衆流齊截住珍御已全拋瑣屑無心顧靈光獨迥然四山頂高步智用絶羅籠度盡復誰度室內自間間兒孫將底付以拂子作相云觸處生光輝團圞無回互弟子方振宗母潘氏五十壽上堂一切智智清淨是母無二無分無別無斷是子子啐母啄莫之為而為非默化於荒忽之中子覺母殼莫之至而至豈伺候於毫髮之間母不自知為母於業則含生於體則載物是為真母子不自知為子於業則雲礽於體則隨順是為真子子之於母渾然相忘而遊於法性之海故日用應緣而錯母之於子廓爾盧而住於淨智之地何時中機感之不赴所以未到者個田地進一步理上三生六十劫退一步事上三生六十劫若到者個田地進一步總持機變一劈華山分兩路退一步別有商量萬年流水不知春親親之道猶星日之聯輝佛佛之壽如山河之帶礪更討甚竺土大仙東西密付好教他台嶽豐干更為饒舌孝華仁侍者二七小參剡溪風雨愁相對寂爾抽身太不情本事獨能人莫及深深海底解橫行力仁力仁果能腳腳到底則滄溟之淺深瞞汝一毫不得要知宇宙之寬廣還須隨我上通玄猛回首漫沉吟驀卓拄杖云得到頂頭雙眼碧不消指點自分明松隱居法姪冰華和尚大悲懺期圓滿同監院三賢請就本菴上堂僧問通玄雲靉靆法雨潤冰翁如何是靈巖的的大意師豎起拂子云此是收頂句進云通結其在斯乎師云著眼聽得分明猶未是觀音入理之門進云更不消說長生話也師云果解旁通線道不妨與汝商量三賢問設供修齊即不問松隱堂中懺期已圓功歸何所師云琉璃瓶貯得此花進云昨夜出山露片雲今日和尚到來是何消息師云瑪瑙鉢盛得此果賢便禮拜師云福慧足矣問層岩形虎踞空瀑勢龍飛是目前句非目前句師云其辨之者草木為之稽首進云更有一句作麼生師云土石為之放光進云則諸佛雲集於無垢界中也師云誰道不是大悲神力之所致乃震威一喝云於此收頂句中著眼聽得分明草木為之稽首土石為之放光誰道不是大悲神力之所致其廣大也豎窮三際橫遍十方其圓滿也包含森象函蓋乾坤其無礙也在谷滿谷在坑滿坑其功德也斗充佛座量莫能窮其果證也高超等妙福慧隆崇其度脫也盡虛空界法性身同如是廣大如是圓滿如是無礙如是功德如是果證如是度脫誰得而廣大之誰得而圓滿之誰得而無礙之誰得而功德之誰得而果證之誰得而度脫之我法姪冰華和尚以一念大悲心而總持之也所以云心同虛空界量等虛空法證得虛空時無是無非法通玄到者裏更有所說是增益非道也若無所說是減損非道也道在我冰華法姪三賢監院師至萬年祝壽堂頭法叔老和尚暨兩序大師請上堂問當年臨濟訪平田今日通玄登法座是同是別師云昨向淺草中信手打著一個進云正是臥龍才奮迅丹鳳便翱翔也師云爭看麒麟頭角煥然虎豹文章進云一堂風冷淡千古意分明師云不待三十年後敢保此話大行問萬年春色差勝蓬壺壽量品中願為收取師云問得恰好答亦不難進云未兆形名是何消息師云當初記得分明甚待到今朝一字無進云是為某甲說為答某甲話師云伶俐衲子目不徒然僧禮拜云伏惟伏惟師云一句迥超千聖外松蘿不與月輪齊問古剎重光即不問玄峰獨踞是如何師云秪有天在上更無山與齊進云和尚今日到來利生接物一句又作麼生師云舉頭紅日近回首白雲低進云可謂天高群象正海闊百川潮也師云秪要十分成現將來用得恰好乃云天台南嶽不隔毫端萬年松在祝融峰元是平田常住物誰知平田常住物元來長在祝融峰既絶遠近之殊亦無彼此之異一切智智清淨無二無分無別無斷於無二無分無別無斷中演出一道無量壽真言隨豎起拂子云重重碧影摩天蜜怛哩孤擊一下云落落圓音匝地蜜怛哩智復以拂子作此相云千歲寶掌當年遊歷浙東西看盡佳山水若會得這個意豈止千歲而已隨曖視左右一匝云自古及今體會這個意底豈竟寂爾無聞乃起身靠拄杖呵呵大笑云分明說向你秪有我萬年法叔老和尚佛誕日舉西堂後堂升座問熾然說法大地得聞和尚升堂是誰秪領師云剩得一身剛帶影見人無力舉藤條進云如何是真實為人句師靠卻拄杖僧拜而起師云十分抑逼將來秪得倩一轉打發乃喝一喝云此無礙辨門應手拓得開自爾領得無盡法財衲僧巴鼻師子爪牙殺活拄杖是我故有何慮不聽我使喚輕輕將山河大地一擊百雜碎舌覆三千底蕩然無所倚而後揚一微塵普攝十方歌躍青山闍黎即雲水調翻白雪雲水即闍黎非措置之所能豈安排之可得苟能當體穿來一下收在鉢袋裏最初威音末後婁至有口沒處開有手沒處插天然勝概迥爾獨尊無佛處說佛無法處說法無僧處說僧是為轉大法輪朝得之則夕被於天下夕得之則不越宿而被天下復喝一喝云其孰能踰於此乙丑四月二十四日舉彬遠璋子繼住通玄上堂師曰臨末垂梢日歸根得旨時喜將收頂句分付克家兒便下座原書闕神無方而易無體此寒山子之詩也以其無體故橫斜圓轉而莫可端倪於無端倪詰其端倪則可以與可以怨可以悲可以喜可以警可以惕可以憤可以悱可以抑可以揚以其無方則神出鬼沒變化不測於不可測而竊測之隨方而易隨地而易隨時而易隨事而易隨人而易隨境而易隨法而易隨情而易隨聲而易隨韻而易易者無能見其體神者無能測其方究其所以為體體無其體是為無體究其所以為方方無其方是為無方無體無方忽焉而九天忽焉而九地高高莫究其極淵淵靡盡其際雲門扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾此寒山詩之骨也一切智智清淨無二無分無別無斷觀音菩薩將錢買胡餅放下手來卻是饅頭拽取占波與新羅鬥額此寒山詩之髓也其知此者不區區自陷於牛跡而廢天下之巨觀翼菴於溟渤中將勺水以益之多見其不知量也庚申夏六月天台國清沙門翼菴善酇序於二隱堂寒山子詩集序朝議大夫使持節台州諸軍事守刺史上柱國賜緋魚袋閭丘胤撰寒山子者不知何許人也自古老見之皆謂貧人風狂之士隱居天台唐興縣西七十里號為寒巖每於茲地時來國清寺寺有拾得知食堂尋常收貯殘飯菜滓於竹筒內寒山若來即負而去或長廊徐行叫喚快活獨言獨笑時僧遂捉罵打趁乃駐立撫掌呵呵大笑良久而去且狀如貧子形貌枯悴一言一偈理合其意沉而思之隱況道情凡所啓言洞該玄默乃樺皮為冠布裘破敝木屐履地是故至人遁跡同類化物或長廊唱詠唯言咄哉咄哉三界輪回或於村墅與牧牛子而歌笑或逆或順自樂其性非哲者安可識之矣胤頃受丹丘薄宦臨途之日乃縈頭痛遂召醫治轉重乃遇一禪師名豐干言從天台山國清寺來特此相訪乃命救疾師舒容而笑曰身居四大病從幻生若欲除之應須淨水乃持淨水上師師噀之須臾祛殄乃謂胤曰台州海島嵐毒到日必須保護胤問曰未審彼地當有何賢堪為師仰師曰見之不識識之不見若欲見之不得取相乃可見之寒山文殊遁跡國清拾得普賢狀如貧子又似風狂或去或來在國清寺庫院走使廚中著火言訖辭去胤進途至任台州不忘其事到任三日後親往寺院躬問禪宿果合師言乃令勘唐興縣有寒山拾得是否時縣申稱當縣界西七十里內有一嚴巖中古老見有貧士頻往國清寺止宿寺庫中有一行者名曰拾得胤往禮拜到國清寺問寺衆此寺先有豐干禪師院在何處并拾得寒山子見在何處時僧道翹答曰豐干禪師院在藏經後即今無人住得每有一虎時來此吼寒山拾得二人見在廚中僧引胤至豐干禪師院乃開房唯見虎跡乃問僧寶德道翹禪師在日有何行業僧曰豐干在日唯攻舂米供養夜乃唱歌自樂遂至廚中灶前見二人向火大笑胤便禮拜二人連聲唱胤自相把手呵呵大笑叫喚乃云豐干饒舌饒舌彌陀不識禮我何為僧徒奔集遞相驚訝何故尊官禮二貧士時二人把手走出寺令逐之急走而去即歸寒巖胤乃重問僧曰此二人肯止此寺否乃令覓房喚歸寺安置胤歸郡遂製淨衣二對香藥等特送供養時二人更不返寺使就巖送上而見寒山子高聲唱曰賊賊退入巖穴乃云報汝諸人各各努力入穴而去其穴自合莫可追之其拾得跡沈無所令僧道翹尋其往日行狀唯於竹木石壁書詩并村墅人家廳壁上所書文句三百餘首及拾得於土地堂壁上書言偈並纂集成卷胤棲心佛理幸逢道人乃為讚曰菩薩遁跡示同貧士獨居寒山自樂其志貌悴形枯布裘敝止出言成章諦實至理凡人不測謂風狂子時來天台入國清寺徐步長廊呵呵撫指或走或立喃喃獨語所食廚中殘飯菜滓吟偈悲哀僧俗咄捶都不動搖時人自恥作用自在凡愚難值即出一言頓祛塵纍是故國清圖寫儀軌永劫供養長為弟子昔居寒山時來茲地稽首文殊寒山之士南無普賢拾得定是聊申讚歎願超生死
