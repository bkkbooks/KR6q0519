body:
  text: 小師序璋等記小參露柱證明如是我聞僧出曰收取蝦蟆口不得師曰一杓臭屎攔面潑僧曰終不相孤負師曰露柱證明問事有形段短長闊狹隨人看理無相狀虛空合喫多少棒師曰教有明文僧曰某甲如是師曰露柱證明問總上來也是甚麼人師曰已有名字僧曰誰是當者師曰露柱證明問千聖位不踐渠在甚麼處師曰青色光明雲黃色光明雲僧曰如是我聞師曰露柱證明小參有恁一段事不可諱去也喝一喝曰離此章句別有商量奇人罕遇小參腳尖頭踢出來底築著磕著火焰裏熾然說底處處了卻築著磕著處處了卻三千剎海夜沉沉十方世界空索索驀顧侍者曰急著鎖卻僧堂門小參簷頭雨滴滴地蘇盧蘇盧㗭唎㗭唎謂是祕盡底呈似你謂是密不從疏處起與麼造次說了道箇深領擔枷過狀屈辱先宗是你不與麼山僧沒可把鼻孔在者裏拈來驀頭打隨拈拄杖卓兩卓小參問正與麼時不是佛祖經歷處等破一切趨進幾程師曰不欲得商量僧曰洎合箇中會師曰撩著便休去問如何是親切為人底句師曰今日風頭硬僧曰太盡情也師曰那容你回避小參良久曰非究竟不與闍黎通拍左膝曰這裏即易拍右膝曰這裏即難小參墮落三途人深達罪福相江西馬大師南嶽讓和尚小參舉僧問靈巖儲和尚今夜起居安否巖曰石虎咽松風師曰四山孤月朗石虎咽松風不放投機處難教話路通結籬小參旱地釘樁目前無法拔脫不去橫七豎八僧擬進師曰決定透不過秪是重添繩索小參千聖不能到是何之道萬法用無虧是何之機左卓拄杖曰虎嘯風生右卓拄杖曰霞飛電走乃橫按曰三十年後莫道山僧和泥合水小參清風白月透幽關畢竟以何為妙訣橫撒豎撒不是妙訣明打暗打不是妙訣草鞋底下常𨁝跳底道不消說也還要鈍置你疾焰過鋒眼中電掣髑髏常吟是決不決晚參僧出拈起袈裟角曰不落綣繢請師便道師曰上座莫性躁僧曰某甲識好惡師呵呵大笑僧問一衆鬧浩浩幾人有孔竅師拈拄杖曰要把瞿曇驀面欺僧曰識甚好惡師亦呵呵大笑僧出曰是何心師曰你與我道僧曰某甲識好惡師乃呵呵大笑曰我鈍置猶可你鈍置我忒煞小參問僧糞堆頭上突起萬法該通一句道將來一僧曰總屬和尚一云紫璘奉供山堂刊定一云蘇盧訶薩師云賺殺須彌鼻孔長小參僧問無言宣祖意時如何師云清風浩浩僧云不消斟酌也師云肩橫一枝錫何處問蹤由僧問赫日光中誰不了師曰拈得鼻孔未僧曰舉起須彌也師便打小參片雲收嶽面浪自靜瀟湘斷頭船子下揚州也代云一時著便又云一時著便洗腳上去十字縱橫作麼提綱良久曰放去收來總不傷此箇蹤由堪繼紹舉僧投子雪覆蘆花時如何子云明白無邊際師曰山河不是你眼睛舉龍門上堂良久曰山僧今日與諸人同參一員真善知識便下座師拈拄杖曰真善知識來也合有一句子衆不散師以拄杖打趁小參甕裏大悲身是他苦有誓願那怕坐久成勞出之一語未敢顒望絶滲漏處道一句來無對師自代曰伏惟伏惟又云古今榜樣祈晴小參卓拄杖曰久雨不晴答金烏飛上鐘樓角復卓一卓云脫卻殼千里萬里阿喇喇小參若實情理論衲衣下那容你分條折縷益州布揚州絹縱橫舒卷用絶商量冬月是冬寒夏月是夏熱吾今已再三汝合知時節小參問僧終日忙忙那事無妨如何是那事一曰有人問著某甲不諱一曰心不負人一曰不可不秪對和尚一曰抑逼人作麼一曰黃連未是苦末上一僧禮拜便退師曰一總討頭不見留待三日後看小參一句淨盡摘卻你眉毛換卻你眼睫忽有箇衲僧出來高聲云吽吽但向道謗斯經故獲罪如是小參一切仍舊便是無事人也古今日月古今山河僧堂佛殿常相對翠柏蒼松浥露寒鐘作鐘鳴鼓作鼓響耳孔裏寬寬急急面門上苦苦樂樂曾不差誤一絲許良久復曰此是什麼樓臺殿閣道得諸佛接手句許汝十字縱橫小參歷劫來事秪在如今一句當堂頭頂天腳踏地萬機不到眼見色耳聞聲一切處不須管帶自然常光現前壁立萬仞拈拄杖卓一卓曰諸人不得向者裏住著不得向者裏坐著直須猛虎口邊作活毒蛇頭上安排更不釘樁搖櫓回頭別有生涯復卓一卓小參欲得現前莫存順逆拈起拄杖曰拄杖子騎山門入佛殿磕著釋迦撞倒彌勒仁者見之謂之仁智者見之謂之智卓一下曰千年蒼玉精化為秋水骨海神護不得鰲頭忽擎出復連卓兩卓一日曰虛空無口憑何說木屐嘴長三尺二一僧出曰豈無和尚在師曰你說誰聽僧曰不是別人師便打之小參動容揚古路不欲得商量汝等各各下去一衆癡立師曰曩謨觀世音菩薩曩謨大慈悲菩薩秋夜小參我心似秋月碧潭清皎潔無物堪此倫教我如何說師喝一喝曰森羅萬象一時失卻蹤由也果向者裏開得隻眼逢人抖擻滿頭灰笑罵豐干這老賊也怪你不得復喝一喝曰賊賊小參碧潭撈摝透脫何時空界指標秪得其體頂門上光焰甚生烜赫耐耐無人用著正恁麼時覓得箇也依舊扶籬摸壁要得不離當處眼目人天乃以拂子打圓相曰當隨山僧手看倘涉遲疑不待孤猿叫敢保一場懡㦬小參久雨忽晴露出眼睛林間泥滑滑時叫兩三聲小參問真如一句穿破天下人髑髏幾箇得知痛癢師曰卻是山僧罪過僧曰則勞而無功也師曰舉似天下問萬人叢裏千人衆中不向一人不背一人此人如何師曰敬禮常住三寶僧曰某甲出家三十年也師曰事非草草乃曰有物先天地不是寶公曲尺亦非志公剪刀領過得底闍黎無分山僧無分一僧出師便起小參百鳥不來春又過不知誰是住菴人與麼說話過慣了清平日子忽朝乾坤側日月星辰一時黑還開得恁般口麼要得嶮夷一致動靜雙忘拈起拄杖曰須向者裏討箇入路連卓兩卓曰我不汝欺小參大凡沙門不可秪一路也認定一路不名活路直下得路便行亦未是性爆更向草鞋邊耽耽閣閣轉腦回頭烏飛兔走小參從上法印不從人得便與麼去天地懸隔盡力道不得底句不是河南便是河北唧唧禿卻我舌也又曰禿卻我舌啞卻你口昨夜洞埋千尺雪石門凍折數株松行化街坊小參拈起拄杖曰法無橫徑道絶孤危遇著通人一錐一答卓一卓曰多虛如何少實千語終歸一當肉案頭邊塊塊皆精喪車幕裏聲聲是血暮暮朝朝朝朝暮暮總不可為汝諸人注腳別欲語君安樂法正忙卻未有間時小參參須離心意識參學須出凡聖路學朝來問訊客至燒香上一畫短下一畫長驀擲拄杖曰丹鳳自騰霄漢去寒鴉猶是噪斜陽小參三世諸佛不知有狸奴白牯卻知有拈起拄杖曰看看三世諸佛走入狸奴白牯隊裏去也何故兩段不同收歸上科小參左右顧視曰好大哥將謂如來惠汝三昧耶昨日栽茄子今日種冬瓜一聲河漏子和月落誰家金色光明雲參退喫茶去小參行不得底如何說口在腳下說不得底如何行踏著舌頭從中一句試請定當小參舉洞山解夏上堂曰秋初夏末兄弟或東去西去直須向萬里無寸草處去良久曰秪如萬里無寸草作麼生去石霜聞曰出門便是草太陽延曰直道不出門亦是草漫漫地師曰好笑好笑者一隊漢通身在草裏打輥有什麼碑記殊不知人人腳跟下當地無私超今邁古若也據令而行秪合一坑埋卻小參至道無難唯嫌揀擇甜瓜徹蒂甜苦瓠連根苦南泉手刃花貓趙州指出庭柏隔山人唱鷓鴣辭錯聽胡笳十八拍連喝兩喝小參至道無難唯嫌揀擇百草頭老僧橫拈也是豎拈也是鬧市裏天子開眼也著合眼也著忽若蚯蚓穿過耳竅蝦蟆跳入眼睛或高或下忽喜忽嗔自是不歸歸便得五湖煙景有誰爭小參至道無難唯嫌揀擇頭上天腳下地行便行坐便坐髮長僧貌醜閉戶怕天寒庭臺一夜雪烏盆變白盆文殊拍手笑普賢努目嗔眼裏無筋者茫茫一世貧靠拄杖曰相逢盡道休官好林下何曾見一人小參拈拄杖卓一卓曰觸目不會道運足焉知路蒼天蒼天便恁麼去已是不堪更擬踏步向前添你三斤麻一匹布有甚用處雖然如是爭肯辜負復以拄杖卓一卓小參終日把鉢盂噇飯不知咽下多少祖師攪得肚裏七上八落若解臨時一屙便了我也不惜手腳汝一籌便擲下拄杖小參一切聖賢皆以無為法而有差別豎拂子曰者箇是無為法差別在甚麼處擊禪床曰一種是無限意有堪聽有不堪聽小參盡大地是拄杖子那箇是自己蘇嚧蘇嚧盡大地是自己那箇是拄杖子㗭唎㗭唎拄杖子與自己是同是別蘇嚧蘇嚧㗭唎㗭唎於此明得一切智智清淨無二無二分無別無別故於此不明山河礙你眼睛拄杖子穿你鼻孔莫道無事好小參大道之源天寬地窄草鞋底穿傾湫倒嶽小參問蓮花未出水時如何師曰照顧自己出水後如何師曰播弄目前又問蓮花未出水時如何師曰煙草茫茫出水後如何師曰湖光落落乃曰蓮花未出水照徹威音到婁至蓮華出水後霞光端不籍東風小參拈拄杖曰甚生次第事特地作難艱乃卓一卓旋顧大衆下座小參問大坐著紹卻西天段事還假記隻字用一功眨箇眼呵口氣麼師曰洞山和尚若在必然大笑進曰何假少方便師曰豈能測其涯涘僧一喝師曰淺乃曰有句無句如藤倚樹卓拄杖曰孟八郎漢和根截斷也免得天下老和尚東扳西援若待樹倒藤枯方才休去歇去有甚麼幹復卓拄杖曰孟八郎漢因事小參諸佛說不到底倒腹傾腸有甚麼碑記祖師行不到底築著磕著幾時是住頭口上兩片皮腳下一方地若卵生若胎生若濕生若化生誰敢穫易他一毫髮許秪如一人發真歸源十方虛空悉皆銷隕者一隊漢又擬著向甚處良久曰人無遠慮必有近憂小參清淨法眼鑑地輝天不雕心印花攢錦簇若是箇絶無依倚盡卻今時底當陽撲破直得大地冰銷聖凡乞命頂門獨瞎管教日月沉輝乾坤失色猶未是衲僧能事而況向赤日裏東覷西捕白地上胡鐫亂鏤其欲紹隆祖位標榜古今何異刻糞作旃檀煮沙成嘉饌此人若到者裏且教後架裏坐何也待伊鼻孔端正款款為渠證據小參舉陸亙大夫問南泉曰弟子家中有一片石或時坐或時臥擬鐫作佛得否泉曰得亙曰莫不得麼泉曰不得師曰盡道老大南泉隨大夫腳跟轉還曾夢見麼真如口門無鎖與你箇方便拈拂子曰得與不得一串穿卻獨坐虛窗花開葉落小參盞子撲落地碟子成七片連得便行底眼裏何曾見喝一喝小參舉永嘉曰摩尼珠人不識如來藏裏親收得師曰大小永嘉將常住物歸衣鉢下既曰收得誰是不識真如不敢囊藏索性和栲栳傾出以手作此相曰四生六道一光中狂夫猶自問彌勒小參青山青白雲白至道無難唯嫌揀擇巢知風穴知雨現成公案不得錯舉伶俐衲僧正好喫棒小參釋迦不出世達磨不西來正當與麼時也好箇時節叵耐後來隊漢莽莽鹵鹵競向虛空裏釘上一橛不是脫節翻空便見枝生丫外卓拄杖曰真如今日若不和根斫倒難免葛藤遍界小參喝一喝曰森羅萬象日月星辰都盧在裏許逼逼塞塞了也著上些無煙火種鼓起沒底橐籥直得烈焰彌空流光遍界三世諸佛歷代祖師盡從此中示現塵剎衆生皆承此光一時成等正覺乃至世間工巧諸伎藝盡向者裏現行此事且道於諸人分上又作麼生復喝一喝曰全火秪侯著小參一字不著畫碧眼胡僧笑點頭滿口拈提滿口樂揀灼然諦當商量不下代云旋風不左轉小參拈起拄杖曰這漢二十年前破家散宅直得前不搆村後不迭店杖頭白月腳底青山不知歷過多少長亭短亭今日既到這裏腳跟還得點地也未乃靠拄杖曰空亭獨立向誰說鵲噪鴉鳴柏樹間小參者裏更不穿汝諸人鼻孔果有勿貪香餌錦鱗當燒餅香而供養之不圖矯矯物外庶幾龜鑑方來若總是今日豈不笑脫彌勒下頷小參問如何是一語三昧師曰今朝臘月二十五如何是愛語三昧師曰看看冬盡也如何是正語三昧師曰即便春風至問如何是祖師禪師曰我不欲驚衆如何是如來禪師曰山僧落地也乃舉古德頌曰我作佛事淵乎妙哉空山無人水流花開師曰正好買草鞋行腳小參若據實論量盡十方世界覓一人伴侶不可得那來天上人間者箇那箇既不解慎初逗漏遺蹤實無走路喝一喝曰爾諸禪德果能進步竿頭從教分身遍界復喝一喝小參如是知如是見如是信解不生法相拈拂子曰喚作什麼直饒道得更有一處礙著擊禪床便起小參曰不管你眼裏無筋僧出曰請師引驗師曰皮下沒點血僧噓噓師曰列下小參午夜燈光連曉照茶煙香篆十分清山僧抖擻尿腸說窗外黃鸝又一聲小參拈拄杖卓一卓曰相及不相及試道看無對師曰謾說而今小參問言宣非旨孰曰有是師曰展開兩手進曰觸處逢渠豈喻真虛師曰拈卻了也進曰不假功成將何法爾師曰又何妨進曰法爾不爾俱為唇齒師曰也不惡問以心中眼觀身外相時如何師曰黃鶴樓前鸚鵡洲進曰是真善知識師曰乘言者喪乃曰真正成壞玩弄神變入一切境入彌勒樓閣入淨妙國土入無差別國土入解脫國土且任諸人點頭拈起拄杖曰把定乾坤又奚為入作隨畫一畫曰跨得這步十方世界一時周匝小參問如何是學人自己師曰聞普請鼓聲麼進曰這箇豈是自己師曰摘楊花摘楊花問如何是佛師曰刀斫不入如何是法師曰火燒不著如何是僧師曰水灑不濕問盡大地是金剛正體二時粥飯向甚處屙師曰莫怪山僧少方便進曰盡大地是涅槃妙心六道輪回從甚處得師曰你看這驢漢乃舉古德曰心隨萬境轉轉處實能幽隨流認得性無喜亦無憂師曰但知隨例餐鎚子也得三文買草鞋小參手上出來手上打口裏出來口裏打一僧出曰淨裸裸赤灑灑時如何師便打僧曰某甲話在師復打曰者咬糞團漢小參橫按拄杖曰恁麼會得妄自囚執不恁麼會避火投溺擲下拄杖曰果是金毛師子子三千里外見淆訛小參僧問目前無法意在目前時如何師曰穿窗透牖動地搖天僧拜起師曰站者邊著師良久乃曰目前無法意在目前穿窗透牖動地搖天會得年年歲歲不會歲歲年年小參曰是甚所在爭受容易代曰將來不相似又曰取性道一句又曰渾崙底取性亂動舌頭相續也大難代曰善來文殊復曰飽喫飯了說真如涅槃善來文殊皮下還有血麼代曰展轉淆訛又曰十二時中如方木逗於圓孔還淆訛麼代曰須到如此又曰東西南北有甚麼過小參四衆圍繞時三點前三點後道是無相涅槃天魔泥乾唱快跌宕金鎚勒咽索白棒擁將行良久喝一喝小參問遍乾坤動天地底是真如體是真如用師曰好箇問頭問一花開敷千葉周匝古佛不著便更是不可說也請和尚救取天下尊宿師曰勞而無功僧曰未是把定乾坤句師曰留與後人貶剝小參問學人不見有自己時如何師曰死水不藏龍進曰如何是活水龍師曰不見有自己問實際理地如何進步師曰當下不留人進曰東邊立了西邊立還相見也無師曰劃時送千里乃曰實論此事順邈將來便不相似小參問如何是印空底句師曰青霄無異路如何是印水底句師曰日往月來如何是印泥底句師曰春盡落花飛問兩隻水牯牛雙角無欄棬時如何師曰攔下問七縱八橫時如何師曰鳥道無前乃曰你刺腳與麼來早是沒交涉也豈況繁辭率爾亂說驀拈拄杖曰是者一隊隊合喫多少小參曰不可無風起浪僧曰髑髏乾盡也師曰作底影響僧引退師曰玲瓏八面言思斷平地翻為荊棘林小參師方舉一切智通無障礙一僧背後躍出師拈拂子曰穿卻你鼻孔卻向腳跟下過去也僧曰阿剌剌師曰接取小參問一字根極時如何師曰依依對看進曰是何之說師曰遼絶殊特不可至僧曰及盡後時如何師曰口似鼻孔小參舉雪竇上堂曰乾坤之內宇宙之間中有一寶挂在壁上達磨九年不敢正眼覷著如今衲僧要見劈脊打師曰推倒牆壁走卻達磨寶在什麼處若是雪竇棒教自喫小參曰威音王已前且無正句代曰東南西北或曰向去底如貓捕鼠卻來底似驢覷井代曰切忌五更初復曰鑿石得玉破塵出經喻如掌中觀物決定了了品題高價須有一句代曰瑕生也又曰不可別安箇題目復曰若也函蓋相應箭鋒相拄須知方木逗圓孔中臨機始得無過代曰于此門中說箇話小參風動幡動心動為你拈了也向甚處見祖師代曰叮嚀損君德又曰不得春風花不開或曰煦日燦開天際雪祖師心印作何顏色代曰露復曰春風吹綻嶺頭梅衲僧巴鼻長之多少代曰深小參僧出師曰有一轉正要秪對你僧曰只看今日師曰餘人爭得聞僧曰不著便也師曰成辦箇事只看今日稍不著便又是明日無對師曰腦後更添一椎小參拈拄杖曰若是以強凌弱有甚麼難我不敢將汝諸人作新到畫一畫曰一味只管喫吽吽小參僧問至道無難唯嫌揀擇坐殺天下人若不揀擇爭得明白走殺天下人一等是祖師門下且聽那箇好師曰將謂是咬人獅子僧曰捩轉鼻孔也師曰風馳電激漸僧曰直偏地無行路師曰看取眉毛有幾許小參眼裏有筋底認定秪這便是但見眉毛廝結刀斧斫不開那知鼻孔同風冷暖不相到不是向大火聚裏打得箇背翻筋斗來爭得箇副鋼硬齒牙生鐵脊骨紀綱箇著如日處空雲蒸霞蔚渠本心日照月臨誰能留礙天之高地之厚水之遠山之長上下曲彔床底幾曾得似者漢良久曰不可更分皮肉骨髓也小參也大奇一從火焰裏打得箇筋斗來眉依舊橫鼻依舊直身若虛空心如牆壁伎倆全無氣息沒些惺惺直是惺惺歷歷直是歷歷帶纍兜率陀天箇漢下頷都笑脫咦別處著你不得小參曰今日且不說破留與後人貶剝下座小參僧出曰一舉不再說師曰涅槃心易曉差別智難明復曰涅槃心易曉差別智難明觀世音菩薩將錢買胡餅放下手來卻是饅頭罕逢穿耳客多見刻舟人小參舉僧問乾峰和尚曰十方薄伽梵一路涅槃門未審路頭在什麼處峰以拄杖畫曰在者裏僧後請益雲門門拈起扇子曰扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾會麼師曰誰能出不由戶何莫由斯道也誠哉是言矣者僧向涅槃門裏直往直來猶自討略頭不著乾峰雖則一期徑捷爭奈這僧岐路橫生更勞他韶陽老子入水入泥把拽不入如今要識路頭麼高聲曰看腳下小參舉香巖和尚示衆曰若論此事如人上樹口御樹枝腳不踏樹手不攀枝樹下忽有人問如何是祖師西來意不對他又違他所問若對他又喪身失命當恁麼時作麼生即得時有虎頭招上座出衆曰樹上即不問未上樹待請和尚道巖乃呵呵大笑雪竇顯曰樹上道即易樹下道即難老僧上樹也致將一問來妙喜曰吞得栗棘蓬透得金剛圈看了這般說話也是泗洲人見大聖師曰嘗行粥飯僧向來問一答十問十答百及乎鼓兩片皮卻向虛空中絢彩枯木上糝花直是令人好笑苟非虎頭上座根下一刀爭得應時瓦解雪竇雖解弄箇花手心未免踏著相似影子徑山妙善取譬爭奈不顧傍觀真如匪敢裁抑古人秪貴鏟除途轍還會麼切忌向語脈裏轉卻小參舉米和尚令僧去問仰山曰今時人還假悟也無仰曰悟即不無爭奈落在第二頭米深肯之師曰米胡抱璞投琛仰山一鑑收下雖則來風深辨然檢點將來豈止落在第二頭當時若問真如今時人還假悟也無但呵呵冷笑直教米胡箇漢更疑三生六十劫小參舉雪峰問僧見說大德曾為天使來是否僧曰不敢峰曰又爭解恁麼來僧曰仰慕道德豈憚關山峰曰汝猶醉在出去僧便出峰乃召大德僧回首峰曰是甚麼僧亦曰是甚麼峰曰者漆桶僧無語峰顧謂鏡清曰好箇師僧向漆桶裏折倒清曰和尚豈不是據款結案峰曰也是我尋常用底忽若喚回向伊道是什麼被他道這漆桶又作麼生清曰成何道理峰曰我與麼及伊汝又道據款結案伊與麼及我汝又道成何道理一等是恁麼時節其間有得有不得清曰不見道醍醐上味為世所珍遇斯等人翻成毒藥師曰青山疊疊萬壑潺潺腳頭腳底步步行寬不忝為天使來及乎被他拈出一箇黑漆桶子直得目瞪口呿撞壁撞牆雪峰雖則費盡手腳其奈猶未勦絶若是真如待他亦曰是什麼劈脊便打果是箇漢管取鼻孔撩天小參舉明覺問僧你見雪竇後録未僧曰見覺曰向什處見我僧曰也知和尚是川中人覺拈拄杖打一下曰夢見拈曰慚愧大小乳峰自己口裏掉下底涎唾不能掩取猶自倩人收拭苟非從苗辨地因語識人底未免當面錯過如今要識雪竇麼喝一喝小參舉僧問安國師如何是本身盧舍那安曰與老僧過淨瓶來僧將淨瓶至安曰卻安舊處著僧送至本處復來詰問安曰古佛過去久矣師曰大小國師浪得其名才被箇驢前馬後漢輕輕一拶直得尾拖千尺至今收又收不得縮又縮不迭當時若是真如待他將淨瓶至便與撲破果是箇漢踏取毗盧頂上行頌曰伐柯伐柯其則不遠睨而視之猶以為遠茶筵垂代以兩手托果盤曰和盤托出也袍袖寬大底還傾得盡麼代曰不可總作沙彌行者見解又曰胡餅裏討汁又曰冰梨雪藕一片兩片自可清涼肺腑因什向胡餅裏討汁代曰也是又曰絶倒傍觀又曰也是不喫他人家三箇胡桃兩塊糖當燒餅香而供養之即今羅列滿前喫即是不喫即是代曰苦死難為人又曰不是上座惜又曰我總不惜合有一分到你代曰深懷恐懼又曰更煩人事又曰只這人事箇箇不知來處向後有人問作麼生舉代曰不敢謗上座又曰總在裏許或拈起胡餅曰微塵諸佛總在裏許具慧眼衲僧辨得盡麼代曰抬起手看又曰穩便將取去復曰假饒十分抬起手也只得一半你試道箇完樂句子看代與驀口𡎺又曰噇卻多少又曰一塵一佛國眼底物物是塵你噇卻多少釋迦老子代曰一箇蒸餅三盞茶又曰口門沒底復曰盡大地團作枚蒸餅𡎺得住麼代曰與一衆作笑具又曰得恁輥輥地復曰古人道不解轉身吐氣者不得子喫你恁樣輥輥地得上口也未代曰幸好一碗茶又曰上座眼光不放闊又曰嫌甚麼或曰至道無難唯嫌揀擇這箇是定州盆那箇是饒州碗是揀擇不是揀擇代曰到者裏有口無開處又曰菱角尖尖尖似錐復曰菱角尖尖尖似錐如何下口代曰茶又喫卻也又曰你若喫盡又在解脫深坑喫不盡又不唧溜作麼生代曰若不是某甲又曰相席打令復曰相席打令逐物意移掇退果桌置一問來代曰洎共上座作道理又曰不可口挂壁上也復曰一向挂壁張口還喫茶麼代曰有人說到裏者又曰更道一句看或曰拈起糖餅一劈兩片是三句中那一句代曰盞子撲落地碟子成七片又曰收復曰盞子撲落地碟子成七片睦州可煞狼籍有好使令底另換一人來代曰額上不貼榜又曰菜刀子使得甚快復曰菜刀子亦能殺人亦能活人因甚要用金剛王寶劍代曰須到如此又曰肯惜眉毛復曰不惜眉毛者能有幾箇代曰信手拈信口道又曰鄭州梨青州棗復曰鄭州梨青州棗觸目未嘗無臨機何不道代曰上座大煞教令又曰齒不得合又曰齒不得合著甚來由代曰撫掌三下又曰豈止今日或曰今日將名品荔枝和皮肉去了送向你口裏也不得道吞卻即禍事代曰須是裂破舌頭又曰莫要茶喫麼復曰曾到也喫茶不曾到也喫茶且道趙州前頭為人後頭為人代曰有誰道不得又曰舌頭不出口復曰茶正香餅正熟舌頭不出口底作甚滋味代曰不用別人又曰某甲不是新到復曰拈卻趙州喫茶去新到來參將何款顧代曰饅頭蒸餅聻又曰少停又曰饅頭蒸餅不妨儘你飽食我要問你三心中點那一心代曰今日供養較細又曰是伊不肯住也或曰胡餅𡎺不住底超談禪客向後作麼生代曰有甚碑記又曰令我攢眉復曰寶雲泉煮峒山岕也不甚惡何用攢眉代曰也是又曰金果早朝猿摘去隨拈起金柑曰金果早朝猿摘去這箇聻代曰是你與麼問那又曰不可不識復曰親從金剛窟裏來底因甚玻璃盞子也不識代曰舌拄上齶又曰塞斷人口復曰言無味說無味無味之談塞斷人口拈卻胡餅道一句來代曰伏惟又曰以空噇空復曰物物不可以空噇空代曰上座佛法身心何在又曰還將得完欒餅角子來麼或曰氣宇如王箇阿師完欒餅角子不要為什反用半截底代曰謝和尚降尊就卑又曰牙如利劍斫復曰牙如利劍斫囫圇梅子不妨一咬百雜碎驀伸手曰還我核子來代曰有人問了也又曰七箇八箇又曰吞卻三箇四箇即不無你還吐得七箇八箇代曰可惜許又曰忒費湯火復曰費湯火底不要現成底快便將來代曰福州橄欖兩頭尖復隨指橄欖曰者箇是橄欖者箇是盆子能以一義為無量義能以無量義為一義你道盆裏有幾顆顆裏有幾盆代曰有一人道得又曰鞏縣茶瓶饒州磁碗或曰無二無二分無別無斷故因甚拈起鞏縣茶瓶卻是饒州磁碗代曰不得向者裏問又曰東壁打西壁復曰推倒牆壁走卻達磨還見燈籠麼代曰更須仔細又曰入水見長人復曰入水見長人茶碗裏上座為甚不出頭代曰是渠害羞又曰老老大大又曰省力復曰省力道一句代曰添香著又曰槎槎丫丫柏子香面門一突裝得滿滿尖尖當得少分供養麼代曰肯屈著你又曰參退喫茶去復曰金色光明雲參退喫茶去尋常還有者箇時節麼代曰達麼縱有真消息總落當人第二機中秋垂語盡大地是箇月輪總在山僧一指頭上豎起指云何處見有一點來放開一句作麼生代曰南閻浮提北鬱單越又曰參退喫茶去又曰山河無隔礙光明處處透傅大士步行騎水牛走遍南閻浮提北鬱單越卻入拄杖子裏去也還見麼代曰將謂有衲僧孔竅猶是屎窖裏作炒又曰灼然復曰灼然百千人中未有一人到此境界不用藏身露影對明一句快道將來代曰高也著低也著又曰高也著低也著狼籍不少還可以一致苕帚否代曰和尚不使別人又曰便與麼去也復曰便與麼去逼塞虛空雖欲回避時直是無回避處作麼生代曰不虛踏破草鞋又曰除卻須彌山拈卻佛殿脊復曰一顆圓光明已久時人知有除卻須彌山拈卻佛殿脊與我通箇消息代曰落在衆人前又曰增一毫不得減一毫不得又曰增一毫不得減一毫不得我也知你親更要問你山僧裂破胡餅因什害帝釋鼻孔受痛代曰邏邏哩又曰可知禮也復曰可知禮也只一笑只者一笑作麼商量代曰拈放腦後復曰一人舉首一人圓後即不問你腳跟下道將一句來代曰珍重下去又曰東西南北又曰東西十萬南北八千縱橫約來不離這裏雖然如此向後不得錯舉代曰叮嚀損君德又曰須彌納芥子復曰我心似秋月碧潭清皎潔納須彌於芥子擲芥子於無垠是我尋常用底拈放一邊爾諸人向甚處見寒山代以手打圓相拓起曰聻又曰見一則瞎汝眼乃曰爾諸禪衲向後遇人切忌三頭六臂
