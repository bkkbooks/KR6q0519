body:
  text: 原韻不須攻人惡不須伐己善行之則可行卷之則可卷祿厚憂責大言深慮交淺聞茲若念茲小兒當自見和韻物類之相應深微而妙善草莽或而舒魚忽而卷秋月揚明輝秋江蓄清淺固是莫之為起滅將誰見富兒會高堂華燈何煒煌此時無燭者心願處其傍不意遭排遣還歸暗處藏益人明詎損頻訝惜餘光慧日炫我目注射何煌煌四天得其正三天得其傍掩之莫能掩藏之不可藏所怪冥盲者無從見爾光世有聰明士救苦探幽文三端自孤立六藝越諸君神氣卓然異精彩超衆群不識箇中意逐境亂紛紛至寶不自寶至文不自文如爾之炫耀胡為獨見君剷彩埋深壑和光入衆群居常能獨葆塵境絶紛紛層層山水秀煙霞鎖翠微嵐拂紗巾濕露霑草衣足躡方履手執古藤枝更觀塵世外夢境復何為平居能照管流注見其微了了空諸有間間老衲衣卓然固爾本無害披乎枝待到無為日無為無不為滿卷才子詩溢壺聖人酒行愛觀牛犢坐不離左右霜露入茅簷月華明甕牖此時吸兩甌吟詩三兩首靈堂孝未滿曹山愛顛酒越樣逞風流無能出其右未曾廣所見寧免窺於牖若是特達人定然忙點首止宿鴛鴦鳥一雄兼一雌銜花相共食刷羽每相隨戲入煙霄裏宿歸沙岸湄自憐生處樂不奪鳳凰池是黑不渝白知雄漫守雌聲氣各以類奇偶鎮相隨奇鳴山之麓偶應水之湄森然住法位鱗貫羽差池貧驢缺一尺富狗剩三寸若分貧不平中半與困始取驢飽足卻令狗饑類為汝熟思量令我也愁悶不取十丈木拘拘持尺寸為其力不能所以長受困尺寸得所安十丈亦可頓小大使由之何必多愁悶田家避暑月斗酒共誰歡雜雜排山果疏疏圍酒樽蘆蕭將代席蕉葉且克盤醉後搘頤坐須彌小彈丸恬神聽鼓樂得之情愈歡歡情何以見陶然在一樽一樽酣未盡佐之以蔬盤大醉眇天地笑看掌上丸新穀尚未熟舊穀今已無就貸一斗許門外立踟蹰夫出教間婦婦出遣問夫慳惜不救乏財多為纍有而未嘗有無而未嘗無及盡無與有搔首空踟蹰踟蹰復歎息不了則非夫決絶從今日毋甘為世愚畫棟非吾宅青林是我家一生俄爾過萬事莫言賒濟渡不造筏漂淪為採花善根今未種何日見生芽天台好山水處處是吾家風月初非借煙霜不用賒千岩飛雪瀑萬壑簇冰花清籟此俱寂冷然發道芽出生三十年常遊千萬里行江青草合入塞紅塵起鍊藥空求仙讀書兼詠史今日歸寒山枕流兼洗耳白雪無從聽朝朝聞下里下里得於心亦可以興起因知三百篇不是草一史此言淡而遠聊以寫意耳世有多事人廣學諸知見不識本真性與道轉懸遠若能明實相豈用陳虛願一念了自心開佛之知見明明在目前有眼不曾見見之日以親不見日以遠今之學道人總是了心願萬劫與千生不得真知見鳥弄情不堪其時臥草庵櫻桃尚杳杳楊柳正毿毿旭日銜青嶂晴雲洗緑潭誰知出塵俗馭上寒山南明破即不堪重來問翼菴竹篦光爍爍麈尾毛毿毿獅子已出窟蒼龍不在潭抹過北山北卻在南山南昨日何悠悠場中可憐許上為桃李徑下作蘭蓀渚復有綺羅人舍中翠毛羽相逢欲相喚脈脈不能語沙界一浮漚名色有如許此是河之洲彼云河之渚潛者以為鱗翔者以為羽物類不可齊千言而萬語子之何遑遑卜居須自審南方瘴癘多北地風霜甚荒陬不可居毒川難可飲魂兮歸去來食我家園椹退後說不會近前道不審事理鬲迷失瞞盰何太甚瞬目而飲恭光相如可飲燁燁古靈芝莫作灰堆椹昨夜夢鄉見婦機中織駐梭若有思擎梭似無力呼之回而視況復不相識應是別多年鬢毛非舊色巧妙石女兒攛梭不解織雲鬢懶教梳也道春無力紛紛陌路人遮莫間相識真個得如之立地起諸色人生不滿百常懷千載憂自身病始可又為子孫愁下視禾根下上看桑樹頭稱槌落東海到底始知休道之不行矣浮海寄深憂古聖且猶爾吾生寧勿愁昔看花滿面今見白盈頭甘與勞生侶悲心無日休世有一等流悠悠似木頭出語無知解云我百不憂問道道不會問佛佛不求仔細推尋著茫然一場愁百歲平分半看看已到頭祖燈將次滅無日不憂碧海驚空闊金鱗何處求蒼蒼如眷念應得慰余愁董郎年少時出入帝京裡衫作嫩鵝黃容儀畫相似常騎白雪馬拂拂紅塵起觀者滿路傍箇是誰家子見解得在霄無能洞其裡縱教摩撮來到底不相似我今有一言劃地平空起無裏亦無盡情說向子浪造凌霄閣虛登百尺樓養生仍夭命誦讀詎封侯不用從黃口何須厭白頭未能端似箭且莫曲如巍巍登玉殿赫赫住瓊樓隨意圖千子無心羡五侯寶蓮時襯足珠幔日垂頭設立千般計衆生盡數鉤人以身為本本以心為柄本在心莫邪心邪喪本命未能免此殃何言懶照鏡不念金剛經卻令菩薩病夜起仰空視中天垂斗柄忽憶未生前何處安身命身命已了了撲破歸元鏡透得兩重光更有三種病下愚讀我詩不解卻嗤誚中庸讀我詩思量云甚要上賢讀我詩把著滿面笑楊修見幼婦一覽便知妙研味寒山詩句句似譏誚誰知譏誚中無限佛心要多半口頭言讀之令人笑笑罷轉思量淺近而深妙自有慳惜人我非慳惜輩衣單為舞穿酒盡緣歌醉常取一腹飽莫令兩腳儽蓬蒿鑽髑髏此日君應悔氣岸何雄雄隨行三百輩名場輥不休利藪心如醉逗到末梢頭一身空儽儽跌倒爛泥中徒然生懊悔夕陽下西山草木光曄曄復有朦朧處松蘿相連接北中多伏虎見我奮迅鬣手中無寸刃爭不懼懾懾渺渺蓮花洋其光甚輝曄紅將珠雨飛碧與長天接華鯨駕山來鼓浪揚髮鬣黑風吹船舫驚懾不驚懾出身既擾擾世事非一狀未能捨流俗所以相追訪昨弔徐五死今送劉三葬日日不得間為此心悽愴百事不干懷頭頭皆善狀幽人天際來特地遙相訪松煙適乍開毛穎幸未葬研吮寫新詩何處生悲愴有樂且須樂時哉不可失雖云一百年豈滿三萬日寄世是須臾論錢莫啾唧孝經末後篇委曲陳情畢造化相循還有得便有失須知歡樂時即是悲愁日歡至情怩怩愁來語唧唧悲歡兩不關是為真了畢獨坐常忽忽情懷何悠悠山腰雲漫漫谷口風颼颼猿來樹嫋嫋鳥入林啾啾時催鬢颯颯歲盡老惆惆忘言空咄咄得意自悠悠歌殘音杳渺彈罷韻蕭颼香雲騰娜嫋松籟發𠺕啾滿目天然趣何來心事惆一人好頭肚六藝盡皆通南見趁向北西見趁向東長漂如泛萍不息似飛蓬問是何等色姓貧名曰空谷響隨聲應虛靈處處通無從尋去住不定在西東迅速同飛電飄揚若斷蓬問伊何所出真性自來空有樹先林生計年逾一倍根遭陵谷變葉被風霜改咸笑外凋零不憐內文彩皮膚脫落盡唯有真實在玉闕連瓊臺勝與諸境倍瑤草常紛披靈芝無變改曠劫到於今日日生光彩試問塵世中何物得長在可貴天然物獨立無伴侶覓他不可見出入無門戶促之在方寸延之一切處你若不信受相逢不相遇法以佛為親佛以法為侶互為增上緣開拓其門戶法是佛心光佛是法居處二見兩俱忘會有真符遇秉志不可卷須知我匪席浪造山林中獨臥磐陀石辨士來勸余速令愛金璧鑿牆植蓬蒿若此非有益長天以為幕大地以為席頭枕須彌山腳伸到積石夢至仙山中授我雙白璧此情雖不真說著生歡益以我棲遲處幽深難可論無風蘿自動不霧竹長昏澗水緣誰咽山雲忽自屯午時庵內坐始覺日頭倚昵成薄俗苟且擅持論夫子為邪僞夷齊指昧昏神龍潛窟宅野魅似雲屯忍使成長夜終當見曉暾憶昔過逢處人間逐勝遊樂山登萬仞愛水泛千舟送客琵琶谷攜琴鸚鵡洲焉知松樹下抱膝冷颼颼乍可常拘謹母為汗漫遊群輕能折軸積羽亦沉舟險絶蠶叢道平長白鷺洲爭如茅屋下風致儘蕭颼報汝修道者進求虛勞神人有精靈物無字復無文呼時歷歷應隱處不居存叮嚀善保護勿令有點痕內湛而外搖無能淆其神如風之吹水蕩漾成波文水性初非動波文不久存澄潭中夜月何處覓他痕精神殊爽爽形貌極堂堂能射穿七札讀書覽五行經眠虎頭枕昔坐象牙床若無阿堵物不啻冷如霜三日一小參五日一上堂為汝得徹困直示以周行拗折拄杖子掀翻曲彔床萬千無一個此念冷於霜客歎寒山子君詩無道理吾觀乎古人貧賤不為恥應之笑此言談何疏闊矣願君似今日錢是急事爾君子生非異善假於物理物理苟不知誠足以為恥懵懂到於今顛毛已白矣從茲汲汲然異得達心爾從生不往來至死無仁義言既有枝葉心懷便譣詖若其開小道緣此生大僞詐說造雲梯削之成棘刺欲得天下安其必去仁義言之甚不稽是以心多詖將何以返之併力攻諸僞純乎抱一真眼裡無荊刺一瓶鑄金成一瓶埏泥出二瓶任君看那箇瓶牢實欲知瓶有二須知業非一將此驗生因修行在今日去古已遠矣誰將振而出如欲大其名必也基其實名實果久當聲聞非一一敢期以自效磨礪從今日余家有一窟窟中無一物淨潔空堂堂光華明日日蔬食養微軀布裘遮幻質任你千聖現我有天真佛捷化如風行發達乎萬物從茲及未來日日是好日人競採其華我獨取其質呈似智者看卻言不是佛我見謾人漢如籃盛水走一氣將歸家籃裡何曾有我見被人謾一似園中韭日日被人傷天生還自有冰稜肆腳行劍刃放步走一似履虛空冰劍我何有無生無不生端然不是韭權借以取譬是誰得知有不見朝垂露日爍自消除人身亦如此閻浮是寄居傎莫因循過且令三毒袪菩提即煩腦盡令無有餘算得極清楚未免費承除一筆勾下也其意將何居我自有造化寧為造化袪知足而安命綽然有裕餘水清澄澄瑩徹底自然見心中無一事萬境不能轉心既不妄起永劫無改變若能如是知是知無背面縱目之所觀總名曰法見及盡有與無是處隨他轉虛空本迢然物象不遷變撲破古菱花將何作背面說食終不飽說衣不免寒飽喫須是飯著衣方免寒不解審思量只道求佛難回心即是佛莫向外頭看夏月是夏熱冬月是冬寒當寒時有熱當熱時有寒此理甚皎皎何必生疑難高超物外眼應作如是看可畏輪回苦往復似翻塵蟻巡環未息六道亂紛紛改頭換面孔不離舊時人速了黑暗獄無令心性昏身披三事衲長揖謝風塵何為重刺腦涉獵日紛紛寂莫林泉下從無有一人嗟哉復嗟哉伶俐智常昏可畏三界輪念念未曾息才始似出頭又卻遭沉溺假使非非想蓋緣多福力爭似識真源一得即永得陰界與衆緣平消出入息常轉如是經定然不淪溺般若具真知解脫有巨力究竟到其中無智亦無得昨日遊峰頂下窺千尺崖臨危一株樹風擺兩枝開雨飄即零落日曬作塵埃嗟見此茂秀今為一聚灰挨到極頭處如臨萬仞崖一撲直見底疑團劃地開秪因難捨命依舊蒙塵埃再過幾春夏通身是冷灰自古多少聖叮嚀教自信人根性不等高下有利鈍真佛不肯認置力枉受困不知清淨心便是法王印卒問驗其知急期觀其信淬磨見其利力鎚因其鈍利者快而便鈍者頓而困知者了而明信者可而印我聞天台山山中有琪樹永言欲攀上莫繞石橋路緣此生悲歎幸居將己慕今日觀鏡中颯颯鬢垂素國清山門前行列菩提樹子老無人收年長落路是物誠難得子何不思慕菩提本無樹吾將抱其素養子不經師不及都亭鼠何曾見好人豈聞長者語為染在薰蕕應須擇朋侶五月販鮮魚莫教人笑汝嗤嗤無禮儀皮體具於鼠蝦蟆教讀書似解聖賢語居上尊其師兩行排學侶人而不如之反使他笑汝徒閉蓬門坐頻經歲月遷唯聞人作鬼不見鶴成仙念此那堪說隨緣須自憐回瞻郊郭外古墓犁為田居止無常定頻年屢播遷功名不成就輒欲求神仙神仙求不得忙忙更可憐勸君早休去耕種祖翁田時人見寒山各謂是風顛貌不起人目身唯布裘纏我語他不會他語我不言為報往來者可來向寒山人說濟顛顛濟顛不是顛語語離窠臼頭頭出蓋纏未能識其人安得知其言相知復相識秪有古寒山自在白雲間從來非買山下危須策杖上險捉藤攀澗畔松常翠溪邊石自斑友朋雖阻絶春至鳥關關出生仙佛府秪此天台山華頂獨峻拔巍巍不可攀長看雲起滅多見石斕斑雪頂龐眉叟終身不出關自樂平生道煙蘿石洞間野情多放曠長伴白雲間有路不通世無心孰可攀石床孤夜坐圓月寒上山山中不肯住何事來人間轆轤隨上下無日得安間勢豪才拜望權貴又追攀到頭乾打哄作速好還山大海水無邊魚龍萬萬千遞互相食噉冗冗癡肉團為心不了絶妄想起如煙性月澄澄朗廓爾照無邊如斯之等類其數有萬千正經不去做隨處弄泥團通身是壒𡒁滿眼迷塵煙到底不知止南邊復北邊自見天台頂孤高出衆群風搖松竹韻月現海潮頻下望山青際談玄有白雲野情便山水本志慕道倫世已無伯樂誰空驥北群驊騮與騄耳運磨使頻有士如新篁意氣徒干雲雖則徒干雲軒然邁等倫死生元有命富貴本由天此是古人語吾今非謬傳聰明好短命癡騃卻長年鈍物豐財寶惺惺漢無錢九聖之所作兩曜懸中天歷世以為寶千秋其永傳讀之如面命死後猶生年佳言與懿行是我真財錢三五癡後生作事不真實未讀十卷書強把雌黃筆將他儒行篇喚作盜賊律脫體似蟬蟲咬破他書帙得既其外文未既其內實內實根於心外文由於筆筆到心隨之自爾成聲律聲律鏘鏘然不覺盈書帙人生在塵蒙恰似盆中蟲終日行繞繞不離此盆中神仙不可比煩惱計無窮歲月如流水須臾作老翁冬冰堅且厚難以語夏蟲以彼之所篤止於一時中達士教以道即物而推窮皤皤百歲老的是白頭翁有鳥五色文棲桐食竹實徐動合和儀鳴中施禮律昨來何以至為君暫時出儻聞絃歌聲作舞欣今日去名者無憂守名者纍實無憂則超然纍實則物律拘律不放縱超然而獨出守名者如星去名者如日寒巖深更好無人行此道白雲高岫間青嶂孤猿嘯我更何所親暢志自宜老形容寒暑遷心珠甚可保草衣縷緑好執帚松門道對石發浩歌披雲起嘯論心話明月秪有豐干老拍板與竹筒至今得完保千雲萬水間中有一間士白日遊青山夜歸巖下睡倏爾過春秋寂然無塵纍快哉何所依靜若秋江水世傳寒山子是文殊大士應化來國清灶前間打睡一身光烯烯瀟灑無所纍出處不可尋如月印秋水勸你休去來莫惱他閻老失腳入三塗粉骨遭千搗長為地獄人永隔今生道勉你信余言識取衣中寶山中常踏碓墜石思盧老圓明燦若珠篩過重新搗功用亦如之傳得黃梅道日日長奉持米麥豆三寶高高峰頂上四顧極無邊獨坐無入知孤月照寒泉泉中且無月月自在青天吟此一曲歌歌終不是禪中道亦不立何有於兩邊衆流俱截斷澄湛一泓泉倒影樹歷歷徹底真見天此是清虛理如何喚作禪鹿生深林中飲水而食草伸腳樹下眠可憐無煩惱繁之在華堂肴膳極肥好終日不肯嘗形容轉枯槁把柄破苕帚間看百草贏生歡喜輸便煩惱煩惱亂紛披歡喜重齊好因此小兒嬉得以悟榮槁花上黃鶯子關關聲可憐美人顏似玉對此弄鳴絃玩之能不足眷戀在韶年花飛鳥亦散灑淚春風前生來窮徹骨從不受人憐肝膽赤如火心腸直似絃長悲今日口不是昔年年搖尾骯髒者唯圖鬧眼前我見利智人觀著便知意不假尋文字直入如來地心不逐諸緣意根不忘起心意不生時內外無餘事苦覓西來意西來本無意春花開滿山秋果落滿地從地而墜落還從地生起別更有奇特不是現成事君看葉裡花能得幾時好今日畏人攀明朝待誰掃可憐嬌艷情年多轉成老將世比於花紅顏豈長保寒寢勿模樣猶言𡓍塌好衣服常褷心地肯掃掃得有工夫不知歲月老歲其不我與是物能恆保有人笑我詩我詩合典雅不煩鄭氏箋豈用毛公解不恨會人稀只為知音寡若遣趁宮商余病莫能罷忽遇明眼人即自流天下我讀寒山詩意不在風雅所貴警惕人使之各悟解如以聲律求未免和者寡善誘諄諄然欲罷不能罷言既無口過何妨滿天下寒山無漏巖其岩甚濟要八風吹不動萬古人傳妙寂寂好安居空空離譏誚孤月夜長明圓日常來照虎丘兼虎溪不用相呼召世間有王傳莫把同周邵我自遁寒巖快活長歌笑吾輩之居處世人所不要問或知幽清不能領真妙妙雖領未能其必不我誚松風徹夜吹山月淡相照縱是紫泥封亦不應他召間來讀詩經雅頌及周邵忽然會我心拍手呵呵笑有箇王秀才笑我詩多失云不識蜂腰仍不會鶴膝平側不解壓凡言取次出我笑你作詩如盲徒詠日世求榮顯人患得復患失既肯折其腰得不屈其膝猶如劇戲然一出又一出我自安林泉陶陶樂長日豐干禪師詩附余自來天台凡經幾萬回一身如雲水悠悠任去來逍遙絶無鬧忘機隆佛道世間岐路心衆生多煩惱兀兀沉浪海漂漂輪三界可惜一靈物無始被境埋電光瞥然起生死紛塵埃寒山特相訪拾得常往來論心話明月太虛廓無礙法界即無邊一法普遍該和草載離天台欲回不得回挨排到今日始得重歸來山深絶喧鬧寂寂松門道更有未歸人替他生懊惱峰頭看雲海了然上下界上界日頭出下界被雲埋忽然消散去城市出塵埃戴笠何處客遙從山下來自言情見忘已得到無礙無礙則淨光法法盡通該本來無一物亦無塵可拂若能了達此不用坐兀兀已絶眼中物何有於電拂時常灑灑然不自守枯兀和拾得大士詩附出家要清閒清閒即為貴如何塵外人卻入塵埃裏一向迷本心終朝役名利名利得到身形容已顀悴況復不遂者盧用平生志可憐無事人未能笑得汝和同見不為奇獨見斯為貴如玉之未形指其在石裏初意非求榮亦不干其利獨出我之見勿使心枯悴彼之見未明是以拂我志我志終不渝再三以語汝佛捨尊榮樂為愍諸癡子早願悟無生辦集無上事後來出家者多緣無業次不能得衣食頭鑽入於寺日月易遷流我獨念之子之子戀塵寰不知極則事極則事如何得之無漸次如子肯來歸共老青山寺若論長快活唯有隱居人林花長似錦四季色常新或向巖間坐旋瞻丹桂輪雖然身暢逸卻念世間人久在山中住不識山外人偶向山下去耳目陡然新紛紛南北客簇簇雜蹄輪羽扇半遮面冷笑山中人迢迢山徑峻萬仞險隘危石橋莓苔緑時見片雲飛瀑布懸如練月影落潭輝更登華頂上猶待孤鶴期息影重巖久不知世路危時聞山鳥鳴日見溪雲飛秋水生白月異樣發光輝至人已孤往我心將誰期我見頑鈍人燈心拄須彌蟻子齧大樹焉知氣力微學咬兩莖菜言與祖師齊火急求懺悔從今輒莫迷八桂峰頭望白雲何彌彌平鋪山半腰山頭靄翠微此峰獨顯拔不與衆峰齊其中失路者我將指其迷君見月光明照燭四天下圓明挂太虛瑩淨能瀟灑人道有虧盈我見無衰謝狀似摩尼珠光明無晝夜語彼居上人其心當愈下心下多謙光謙光則瀟灑瀟灑均蒙恩沒齒生感謝余固所不能黽勉於夙夜余住無方所盤礡無為理時陟涅槃山或玩香林寺尋常只是間言不干名利東海變桑田我心誰管你地運之興衰灼有固然理昔是瓦礫場俄成金碧寺施者日填門盡云求福利福利在汝邊我無可與你右手握驪珠右手執慧劍先破無明賊神珠吐光焰傷嗟愚癡人貪愛那生厭一墮三塗間始覺前程險我欲斬癡頑長操三尺劍稜稜般若鋒咄咄金剛焰寰宇已太平時中無可厭間處更隄防無從肆其險我詩也是詩有人喚作偈詩偈總一般讀時須仔細緩緩細披尋不得生容易依此學修行大有可笑事入風雅是詩涉道理是偈道理入風雅平易而精細風雅涉道理精細而平易若更分異同卻又多其事從來是拾得不是偶然稱別無親眷屬寒山是我兄兩人心相似誰能狗俗情若問年多少黃河幾度清天台有寒拾無處不名稱拾小自為弟寒大居然兄非唯同意智而且同性情問他住那裡長年在國清各有天真佛號之為寶王珠光日夜照玄妙卒難量盲人常兀兀那肯怕災殃唯貪淫佚業此輩實堪傷天然無盡藏取用任張王明月連車載清風平斗量一貪阿堵物爭免壓油殃舉世茫茫是我心寧不傷間入天台洞訪人人不知寒山為伴侶松下
