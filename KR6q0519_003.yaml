body:
  text: 小師序璋等記己酉春中朱郡侯葵石同闔郡縉紳孝廉文學居士暨令弟子葆子蓉令嗣範臣迪臣令孫辰始子上等請住真如禪寺上堂指法座云是甚所在爭受容易道不得齊肩句子幸自可憐生應須高著眼便升拈香云此一瓣香推出虛空光騰萬象端為供養始祖釋迦文佛大和尚恭願一人高拱四海晏清此一瓣香超越事理函蓋正偏具有十方通貫之量該攝一切差別之門普同供養飲光尊者直下六十八世先祖大和尚伏願闔郡尊官紳襟護法憑將補袞調羹用助顯馳雷掣電機此一瓣香廣大分曉雲廓天布不爭尺寸於形名之間唯收實效於言意之表奉為開山遠祖黃檗運禪師中興師翁三峰藏和尚伏願鶴洲郡伯續佛壽於靡涯長水耆英播道聲於無盡更冀孫枝赫奕振今古之洪謨正令軒騰闢人天之深域丈上拈香云此一瓣香大智必然點首小根未免驚疑處處無礙淨光是甚麼爛木橛單為供養心雄手辣直摶取三千大千之人不拘限量登時超然於祖佛之上薄祖佛而不為本師南嶽退翁老和尚聊以表示淵源敢云酬恩報德寶林和尚白椎云法筵龍象衆當觀第一義師云驀地一椎玄路杳絶有向鳥道上展手底出來放樣問握新符入祖室已見風規上古摩九霄撫四海願觀樞要今時師云那轉不曾爛卻進云逸格之資自不惜其唇吻師云幸留而今秪對進云直是罕遇師云實無一字相欺問擔佛著肩上行底出語固無碑記祖佛為師者提到宗乘的旨爭好一字不對師云事難忉怛進云面赤何如語直師云著甚來由進云豈止人天為師師云莫怪撒沙進云恐拂諸方所欲師豎拂子云這箇喚作甚麼僧顧第二位云為汝得徹困師云匪遇上根宜慎辭哉問法布真如紀代者三矣同時不識祖已自全彰父父子子箇段話願為拈出師云何用繁辭進云今日莫是獨彰子道麼師云廓達門戶一覽洞然進云此事知非勉強師云故作崤函真如罪過問從上法要如何闡揚師云真如從不曾呵口氣到你面上進云特地上來便好徒然師云又肯將捻土塞你眼裏乃曰清淨心光中流出三句深遠莫倫悠長無際是不從前一地至最後地得入實是超越一切法地得見屋裏佛真法身故於一切處而無所礙一切處而無所拘弗取裁於匠手照用齊彰弗稽度於哲人理事兼到匪同一格鼓激臍輪氣海敲磕牙關排疊勝妙成其義句設問如何是第一句有扣弗應遺斯機候如何是第二句赫定厥初萬口相慶如何是第三句回環言外旨奕葉劫前香於三句外更請一句直饒量取河沙算他過去未來現在亦無有窮盡乃舉三峰藏師翁上堂曰第一句薦得大地江湖盡放光第二句薦得逢著觀音問彌勒第三句薦得舌拄上齶師曰盡乾坤人口到這裏百雜碎何消腳下孫子更用敲骨取髓痛下針錐底手腳穿過髑髏拶破鼻孔既爾忝居祖室敢不稱述憲章第一句薦得等是借路經過就中卻甚奇特第二句薦得但有來者不虧欠伊總識伊來處第三句薦得如何有出人底路喝一喝云你且識取者箇隨拽拄杖下座當晚小參僧問如何是第一句師隨聲喝曰臨濟來也如何是第二句師曰訛言亂衆如何是第三句師曰整理不得也隨左右顧視曰直下不受整理掇轉過量境界一元和二佛陀三達磨到處輥輥地管他甚名身句身喝一喝曰者裏一時透去便見天地懸殊這裏透不去不好不説他周匝有餘如何是第一句周匝有餘如何是第二句鴛鴦繡了不度金針如何是第三句萬古悠悠有誰著眼上堂有一兩句上大人口不能言拄杖子謹代與語乃拈拄杖東向一點曰是諸人生長句西向一點曰是諸人安立句向上一點曰是諸人升入一切智乘句是流出一切法奧句通身是一句遍身是一句山河大地是一句草木叢林是一句四七二三祖是一句天下老和尚是一句心到手到是一句布之文字是一句更有一句甚麼處去隨卓拄杖曰沒底籃兒滿著裝黃金索子鎖不住去去果爾不屈則遭逢有據時有僧躍出曰某甲是句不是句師劈頭打下曰我屈著你甚麼處晚參鐵蛇橫古路全不照管自己底目前彩鳳舞丹霄秪是播弄目前底自己目前自己不立纖毫自己目前了無過患開眼直看腳下徹見宗師血脈灼然誰是其人隨拈拄杖云吹毛不動遍地刀鎗卓一卓曰作麼生荊棘林中太平得路小參有句無句如藤倚樹任你攀枝摘葉一朝樹倒藤枯看你無所措手足拈起拄杖曰向虛空裏釘得這橛便可以為天下之大經立天下之大本其或未然百姓日用而不知君子之道鮮矣姚江孫太夫人請上堂生佛未具以前段事秪在當人腳跟下有甚些須難會底道理上來也步步登高下去也通身無礙主賓玄要左右逢源意句事理心手相應何待拳倒浮幢王躩翻香水海然後凡聖心平等高低路坦夷腳腳但秪與麼去迢迢空劫即今時其如情存向背意度玄微四相宛然諸塵立對則目前一切差殊形色音聲尚不能於自分境不相踰越如何得不起滅盡定而現諸威儀不捨凡夫法而行諸勝行而今要得速疾相應與你放出面門箇無位人看喝一喝曰果爾三頭六臂努目一嗔劈破華山分兩路萬年流水不知春拽取占波與新羅鬥額復喝一喝請職事上堂維那才白椎師喝住曰不待第二椎便性燥平生光揚宗眼馳驅龍象雲起霞蒸叱吒群靈烏飛兔走罔弗聲和氣順那敢失候違時何必森羅敲磕才知動蕩無私萬象鏗鏘始見對揚有準踏著聖凡命脈抉開祖佛心髓底出來證驗隨拈拄杖卓一卓曰者裏著眼令不虛行中夏小參至道無難唯嫌揀擇前是山門後是佛殿不須息見鐘作鐘鳴鼓作鼓響何用求心坐時但坐行時但行日上月下水寒山深是法住法位世間相常住於中及節應時了無向背拈拄杖卓一卓曰天地與我同根萬物與我一體今年蠶麥熟羅睺羅兒與一文復卓一卓曰狼藉不少小參今日看定諸兄弟了也諸兄弟千里萬里盤山涉嶺來到這裏挨他赤日冷月不無所圖我這裏清寥寥乾嚗嚗沒星子元字腳到諸兄弟苦苦來我這裏圖箇甚麼諸兄弟死不肯放過真如真如又肯便恁放過諸兄弟真如與諸兄弟同一處住同一見聞同一起倒同一出入明明地開提明明地展拓不肯欺諸兄弟又肯昧諸兄弟自是諸兄弟於一切時一切處和合佛和合祖和合一切法句以是之故塞自悟門不見古人道不假記隻字亦不用一功亦不用眨眼亦不用呵氣大坐著紹卻西天段事猶是望上心不息直須嫌佛不作嫌法不説於此門中始有少分相應雖然秪如未到玄源如何究理乃拈起拄杖曰借者上座作箇指南隨卓一卓曰入得門來事事奇見聞聲色不思議山青水緑元無事盡是諸人力使之錢學憲珥信請為高太夫人對靈升座驀拈拄杖曰放出無礙淨光卓一卓曰迸開心地靈源滔滔灝灝鬱鬱隆隆河圖不能象章亥不能步固是錢母之本事何藉真如為舉揚雖然苟非格外垂慈爭得俯開後葉復拈拄杖卓一卓曰山河大地本無依成化含生功用奇識得無依真佛母天風木葉總全提知事化菜柴小參也奇莖草之上現不可稱不可説無數無量玉殿瓊樓有不可稱不可説無數無量恆沙化身諸佛諸大菩薩于中安住出大音聲而唱是言諸法從本來還從本地入得是三昧者能使入於掌輪彼亦不礙此亦不覺可以縱可以橫可以離可以合可以貴可以賤可以近可以遠山僧坐地觀光好不起而稱頌隨卓拄杖曰驀地出隻手一舉四十九不消彈指頃箇箇盡知有普請搬柴小參一舉四十九便該盡竺乾震旦問十方塵剎問過現未來問山河大地問應知箇段義慶喜結集不到童壽翻譯不來智莫能知之而識豈能識苦苦勞他森羅萬象日月星辰風雨晦明雷霆霹靂盡令提綱全生全不主全用全不用更問東堆西堆法身長短三轉內三轉外人搬柴柴搬人雲門道底小參法身不解喫飯欠一粒也不得剩一粒也不得漆桶不會打鼓普請看總是與麼野狐精見解咸通年已前咸通年後作不得箇影響更向枯樁非枯樁上明他盡把格則何由出竅饒是淨裸裸赤灑灑沒可把古佛與露柱相交道將一句來蘇嚕㗭哩莎訶師四十誕辰葵石居士暨闔寺耆宿設齋請上堂問無上法王有大羅尼門流出一切智智清淨是大神咒耶是大明咒耶師曰從朝至暮念千念萬不是念不到進曰實謂罕聞師曰得共林泉相與嚙嚼此事也須慶幸進曰若然則謹當奉行師曰可一掌置而熟視進曰自非善巧師無能決此理師曰展事投機今日驗乃曰若欲全舉除非直與隨震聲喝一喝曰遍乾坤動天地底是什麼驢漢與麼承領得下不假莊嚴天然尊貴超超然於等妙二覺之表決定不流至第二念過去如是如是未來如是如是現在如是如是如是之法妙絶言詮明明了了無悶不宣放於六合而無外卷於一密而無內但得一切無心自能在處周匝復喝一喝曰設有一法過於是者我此一喝不作一喝用小參舉僧問智門如何是般若體門曰蚌含明月如何般若用門曰兔子懷胎雪竇曰非唯把定世界亦乃安貼家邦若善參詳便請丹霄獨步靈巖儲和尚曰言前定奪鐵壁無門格外稱提劍鋒有路不是破盡和合識相滅盡相續心相不能凌憑北斗截斷衆流蹴踏東山隨波逐浪而況頭頭事存函蓋著著理應箭鋒珠鎖九曲智門不費神功玉解連環雪竇大傷心力秪如著燈籠向佛殿裏將山門來安燈籠上是般若體是般若用良久曰不得于親不可以為人不順乎親不可以為子其明覺之謂歟師拈竹篦畫一畫曰般若體用一時畫破了也茫茫匝地普天甚處討他光境饒你如今不被一切有無諸法閡亦不依住無閡亦無不依住知解要見智門雪竇豈止如隔須彌若是我靈巖老師隨喝一喝曰待你這箇舌頭得到口裏或者摸著邊皮也不定小參拈起拄杖曰生掘路土造佛何嘗內意先立文彩繞後秪是臨時捏合應手從心奇奇離離高高低低無不是他成就慧身底時節如待古殿重開華赫莊整才始想見威靈不同冥杳隨放下卓一卓曰將知你秪是漆桶法華經期為辰始居士保福求名上堂喝一喝曰雅思淵才文中王乘是寶乘直至道場將次説法饒益無盡正是升騰之時正是顯發之時正是得自在之時正是施無畏之時金聲玉振匝地風光虎驟龍驤平添意氣不獨鵬程搏萬里更看良驥快先聲所謂名花萬種唯采優曇大寶千般先求如意自然到處稱尊隨方受用此正屬外轉事且內轉一句畢竟作麼生道門庭盡是兒孫事祖父間間不自知雲間弟子香忍六十誕辰請上堂喝一喝曰達得一切名身句身説事固不妨説理亦不礙目前歷歷孤明似地擎山不知山之孤峻處處不滯通貫十方如石含玉不知玉之無瑕所謂的的本生面目原具萬德千輪不用黃金裹貼自能吞日月光看他元和佛陀達磨是甚麼乾矢橛箇段意旨真如從威音王已前第一會説法時祕之金匱曾未顯露今日有樁緊要人事不辭盡情揭示當陽隨聲喝一喝曰豈不靈音落落殊應章章又喝一喝曰縱橫無不是何用更商量侍者湘曉為圓修順二七請小參舉雲門示衆曰天堂地獄鑊湯爐炭蓋卻你頭三世諸佛在你腳跟下三十年後鼻孔撩天師曰埋沒人家男女説甚三十年後若輕易放他三世諸佛出頭則不能於鑊湯爐炭裏成等正覺刀山劍樹上遊戲神通以慈心三昧安住忍地尋常得此便固不在言還知鼻孔在我手裏麼隨以拂子擊禪床曰快生脫取去鶴洲太守葵石居士營壽域上堂金剛般若波羅蜜受命仁人群善集守正持源古道存心事光明曜千佛祖燈繼燭法路開者也之乎展巴鼻攝受方來不等間情深一往何洋溢惟篤所信而貴珍百世之上成特立百世之下符契同所以單言壽金石金石浩劫永不磨幽隱何能掩其蹪精瑩直射古皇前從茲及盡未來際炳炳琅琅不可誣紫芝朱草結靈氣以之為己則心安以之為人則用備以之昭垂則無窮以之立向則永利隨拈拂子畫相復書封字曰以此正眼密弘之垂休光照千百祀文節法師三周忌設供上堂豎起拂子曰知向裏許承當不見有承當者莫坐住一色麼不是蕩盡來時風高月冷他亦不居底爭得透過十方以空劫轉自己受想悉寂滅以自己轉空劫心量亦無有到者裏便能撒手毗盧頂上轉身威音那邊不住無相剎剎分身不住有相塵塵絶迹秪者是淨光無礙之真過外是無縱橫展拓之本事無二無分蘇嚕㗭唎無斷無別㗭唎蘇嚕過去諸佛現在諸佛未來諸佛無不從之流出一切智智清淨今日即將此箇法門莊嚴文師報土究竟空無所得惟願一肩領荷既是空無所得且道又領荷箇甚麼隨以拂子向上點曰頂門一道光明透始信山僧見不差赤肩沈邑宰請為尊翁襲豫奉政大夫對靈小參攬衣就座隨旋視左右一匝曰今此諸大衆如本未曾有還知古往過去劫中正法明如來所説神咒名曰總持一字真言明明密密密密明明卷舒無際隱顯同源麼真如於彼如來會中親聞是咒祕之金匱曾未顯示今日特為襲翁大夫分明朗誦一遍隨以拂向空劃曰還聞麼切恐襲翁視之不靜其聽未遠不妨更舉一遍復以拂子向空劃曰還聞麼若也聞得便是徑直往西方底隨身公驗是以我此法門若非證入難曉宗猷赤肩邑宰以尊翁所得所證將欲饒益無盡特請真如重為闡揚前來既以再三而今不可更有所説勉意勿獲而已秪得奉為解釋務使盡大地一切衆生知得箇道總持一字真言彼彼不雜重重無礙如寶絲網交光相羅能以一字攝百千萬億以百千萬億該通一字若論總綱舉目張原不動若論持此事何曾待所思若論一橫亙十方無等匹若論字河洛交呈不相似若論真聖聖相傳古到今若論言聲輪無礙透三千若論明無不從之稟曜靈若論密佛眼從教覷不及若論卷國土山河隨我轉若論舒時中體用自如如若論無虛空背看未生圖若論際是中境界難思議若論隱六門廓達常虛靜若論顯麗天日映琉璃眼若論同如布陽春大地中若論源願普悲長塞大千所以道是他能與一切法安名一切法與他安名不得其受持之者持到無所得時并這無所得亦不可得忽然信口念著則無始塵垢一時銷落金剛體上發大智光方知蘇嚕㗭唎㗭唎蘇嚕盡從當人大悲心中流出説到這裏衆中有箇曉事禪客出來扼腕向前曰從上諸説本但以假言説是際無所有不得名字相和尚與麼刻劃得不乖於佛意乎山僧隨以拂子劈口撼曰這話墮阿師便下座報薦請小參以拂子擊案一下曰如是我聞十方國土廓周沙界此三句中一句如天普蓋一句如地普擎一句如日普照第一句中涌出八千寶樹瓊枝玉葉芳馥分布一一樹下設黃金座衆寶為足飾無量高四丈九尺大衆你道坐此座當説什麼法他道向下文長且看第二句作麼生第二句便是經題上底字以字不成八字不就不可教我更下注腳也與麼則秪有第三句在若説第三句沈母陳夫人有靈便應作禮而去雖然三段不同且畢竟如何是收歸上科一句隨擲下拂子曰釐奴光放三千丈白牯欣欣笑不休啓建法華長期葵石居士設齋上堂拈拄杖卓一卓曰如上之所説巍巍乎眼見蕩蕩乎耳聞以知過去法知現在亦然不分別未來無有三種相何有於所知以無所知故赴群機而不竭燭萬象以無私復卓一卓曰六萬餘言七軸章盡情卷疊在當場其有不蒙斯利者真如誓不成正覺復連卓兩卓曰佛佛相宣稱善吉敷陳妙旨絶囊藏小參然於一一法依根葉分布拈起拄杖曰者箇是根何處得一一法隨卓兩卓曰者箇是一一法那裏得根來乃放下問僧曰會麼曰不會師曰不會最親切復示頌曰親言消一句妙語不須多趙州東壁上歷落挂葫蘆小參雨歇農方作天空蟬盡鳴始見望朝又已念日真如堂中坐臥固亦不惡或若當此一問將如之何直下信得臨濟德山不足標榜弗作奇特商量一任寒暑裏經冬過夏祈晴小參大用現前不存規則拄杖子智通無礙東海鯉魚打一棒鴛鴦湖裏浪滔天正恁麼時長耳古佛遙從金地放一道寶光照耀諸人頂門復於光中唱言是大神咒是大明咒是無上咒是無等等咒能除一切苦真實不虛大衆因甚説到者裏不見道一二三四五大地無寸土復其見天心日輪正當午上堂拈起拄杖曰千仞壁立所在而者上座一踏到頂不見高峻難上者卓一卓曰蓋為他迥絶扳攬了無依倚又卓一卓曰都道便恁住了卻也進進無已涅槃門解脫門般若門八萬四千深法門處處排身直入頭頭領攬其全而於我此法門望之尚遠其如智勇不磨視超前烈真如與汝放通線道復卓一卓曰一擊響玲瓏轟喧宇宙通知音才側耳項羽過江東小參今朝日麗風和藹然佳氣山僧與拄杖子結伴遊於無量甚深行處明明無際了了無邊瞥爾打箇眼花見長水坡前彩雲堆上涌出七寶蓮花白銀為莖黃金為葉甄叔迦寶以為其臺真珠羅網次第莊嚴有化如來坐寶華中從其面門放五色光即於光中現五趣身一一趣身有萬八千種形類一一形類現百千種身一一身中復有無量恆河沙等身於四恆河沙等一一身中復現四天下大地微塵等身於一微塵身中現三千大千世界微塵等身於一塵身中復現於十方一一方面各百千億諸佛世界微塵等數身乃至虛空法界不思議衆生等身一一身光喻如大龍蟠蘭椿輪蒨練粲爛山僧睹斯光相如是淨妙如是殊勝心生戀慕目不暫捨爾時如來即攝光明繞身七匝還從頂入驀拈拄杖問曰是你正當與麼時回互不回互回而更相涉不爾依位住擲下曰參同不二心歸堂喫茶去小參驀指堂前露柱曰者漢於荊棘林中出身可易月明簾外脫體應難泯然聞見不到秪緣定等虛空兀爾緣慮俱忘自是心同稿木實頭句子刀斧斫難開真佛法身黃金裏不就迥出六塵之境堂堂無蓋覆直造一相之門了了沒遮欄目前無纖毫過患一任挨拶將來自己不見有一色轉難放他過去當體擊碎般若解脫便能到處成立道場猶未稱全提時節好笑雲門大師道你作麼生不説禪致使埋沒人家男女箇箇擔枷過狀雖然渠能與古佛相交且畢竟是第幾機明明理極忘情謂箇裏如何喻得齊小參棒喝向爾不能施語言向爾使不著硬剝剝針不劄露裸裸風不入是這般底有什用處秪合向人家簷下今日明日前秋後秋樁樁地立到驢年咄山僧與汝著方便不與一法作對便是無諍三昧爾當成佛在威音王已前小參舉金剛經云若見諸相非相即見如來法眼云若見諸相非相即不見如來德山原和尚曰若見諸相非相劈脊打下良久曰何故如斯之事如來明見無有錯謬師曰前頭卻實後底打不著若見諸相非相驀卓拄杖曰山河大地有什麼過晚參舉雪竇顯和尚示衆曰大施門開無壅塞忽有箇衲僧出來雪竇倒退八百里何以臨危不悚人師曰真如不像雪竇憑空捏合欺誑平人大施門開無壅塞東邊來底與他三斤麻西邊來底與他一匹布忽有箇打中間來底又與他箇甚麼便拈棒劈頭打云我欠少你箇甚麼何故但不孤於己自不負於人小參超毗盧之談越釋迦之句喝一喝曰迥然不在者裏直是十萬八千果爾大用現前那復更存軌則又喝一喝曰看看千歲寶掌變作燈籠走入露柱裏去口口道光非照境境亦非存光境俱忘復是何物直饒與麼猶在半途未是透脫一路復喝一喝中秋小參盡十方世界是自己光明未曾有一人用著真如於無數量中略露目前些子隨拈竹篦曰看看彩雲堆上彩雲飛長水坡前長水繞有眼目兄弟熟不知天上月圓人間月半天上人間流光不斷箇段意旨了了明明誰家疊得在摺袋裏直下真際平提神通各露不妨與你箇助顯法門遂起身曰歸堂喫茶小參空手把鋤頭揭諦揭諦步行騎水牛波羅揭諦人從橋上過波羅僧揭諦橋流水不流菩提薩婆訶驀起身炷香曰其不與現前諸兄弟同證是三昧者有如此善酇謹白洪州法昌石葉和尚訃至上堂天下莫不嚮風朗然知所宗式足徵我石兄和尚令不虛行也夫宗師血脈或聖或凡森羅萬象日月星辰他方此土有情無情俱入此宗喝一喝曰九天之雲下垂復喝一喝曰四海之水皆立儼然勝概不尋常令人千古空相憶投遠語上座三七越明日設供上堂真如可煞健忘不省三七草一剛才洗腳上床無端記起時日一夜轉側躊躇尋段話作頭供養直是覓起處不得忽聞風撼塔鈴則知盡大地是一轉語隨拍繩床角曰這裏拶去東家作驢復右拍曰那邊轉得西家作馬七出八沒風流儒雅驀喝一喝曰調高何患知音寡小參舉三峰藏和尚摣周不取一物微笑而已靈巖儲曰自為即得又曰他後將何為人堯封潛曰何不與拄杖子隨聲便喝師曰三代禮樂止于是哉取此為祖門令嗣豈不賺殺人臘八日小參雪竇明覺和尚曰見一則瞎卻眼知一則翳卻眼翳生則天上人間瞎卻則三頭六臂迦文老子秪為這點星光落向父母所生清淨寶目中一生坐定在者裏道是一切法不遷攬真成立色相宛然不知帶纍殺天下莽蕩禪和不解照管自己一味播弄目前隨拈拄杖卓一卓曰真如事不獲已向灸瘡瘢上更著一爝汝等諸仁作麼生與箇老子雪屈良久曰人無遠慮必有近憂因雪上堂世界一真依何成立大觀平等作麼建明遍乾坤沒罅子空缺體明無盡盡大地作一句商量神用自通更説甚十方虛空一時粉碎森羅萬象杳絶蹤由爭禁得無位真人寒毛卓豎空中大象意氣平添又何必玉階鎖斷始契劫前銀碗盛來方明一色到者裏十方佛是眼中花十方花是眼中佛畢竟是甚麼人境界驀擲拂子曰面目現在小參晝見日夜見星三家村裏納稅漢請過一邊南作北東作西蝎尾蛇頭一試之底與他饅頭蒸餅喫隨出拳云也不屈著你除夕小參左右顧視曰也須自著忖量漿水錢固是討頭腦不著粥飯錢將甚麼抵償可憐生樁樁地坐看北斗立覷黃河有三言兩語難為出口無情面漢子可是放得你過驀卓拄杖曰果爾一下下交到所在登時端由確乎不拔便是得大無畏之時得大自在之時動揚古路何用商量或若未然又卓一卓曰你但領下明朝看消息嘉興秀水信童朱上麟頂資刻此真如語録首卷所祈功名達重光祖父門庭麟躍繁昌永佑皇家柱石
